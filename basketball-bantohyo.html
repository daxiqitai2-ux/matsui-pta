<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>バスケ部 8月 当番表</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #1a3a6b;
  --gold:    #c8a200;
  --sky:     #4a90d9;
  --mint:    #3ab89a;
  --cream:   #fff8ef;
  --pale:    #e8f0fb;
  --muted:   #7a8a99;
  --border:  #d0d8e8;
  --bg:      #f0f4fb;
}

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: linear-gradient(135deg, #e8f0fb 0%, #f0f4fb 60%, #fff8ef 100%);
  min-height: 100vh;
  padding: 16px;
}

/* ヘッダー */
.app-header {
  text-align: center;
  padding: 20px 16px 16px;
  background: white;
  border-radius: 20px;
  margin-bottom: 16px;
  box-shadow: 0 3px 16px rgba(26,58,107,0.12);
  position: relative;
  overflow: hidden;
}
.app-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--navy), var(--gold), var(--sky));
}
.app-header h1 {
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--navy);
  letter-spacing: .05em;
}
.app-header h1 span {
  color: var(--gold);
}
.app-header .subtitle {
  font-size: .78rem;
  color: var(--muted);
  margin-top: 4px;
}

/* イベント選択 */
.event-selector {
  background: white;
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 10px rgba(26,58,107,0.08);
}
.event-selector label {
  font-size: .78rem;
  font-weight: 700;
  color: var(--navy);
  display: block;
  margin-bottom: 6px;
}
.event-selector select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: .85rem;
  color: var(--navy);
  background: var(--pale);
  cursor: pointer;
  outline: none;
}
.event-selector select:focus {
  border-color: var(--sky);
  box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
}

/* 更新ボタン */
.reload-btn {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--navy), var(--sky));
  color: white;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: .85rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .05em;
}
.reload-btn:hover { opacity: .9; }

/* 凡例 */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: .7rem;
  color: var(--muted);
  background: white;
  border-radius: 20px;
  padding: 3px 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

/* カレンダーコンテナ */
.cal-section {
  background: white;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 16px;
  box-shadow: 0 2px 10px rgba(26,58,107,0.08);
}
.cal-section-title {
  font-size: .9rem;
  font-weight: 900;
  color: var(--navy);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--pale);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* 曜日ヘッダー */
.day-header-row {
  display: grid;
  grid-template-columns: 80px repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 4px;
}
.day-header {
  text-align: center;
  font-size: .68rem;
  font-weight: 700;
  padding: 4px 2px;
  border-radius: 8px;
}
.day-header.sun { background: #fde8e8; color: #c0392b; }
.day-header.sat { background: #e8f0fb; color: #2563b5; }
.day-header.week { background: var(--pale); color: var(--navy); }
.slot-label-header { font-size: .68rem; color: var(--muted); display: flex; align-items: center; padding-left: 2px; }

/* スロット行 */
.slot-row {
  display: grid;
  grid-template-columns: 80px repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 3px;
}
.slot-label {
  font-size: .62rem;
  color: var(--muted);
  font-weight: 700;
  display: flex;
  align-items: center;
  padding: 4px 2px 4px 4px;
  background: var(--pale);
  border-radius: 8px;
  line-height: 1.3;
}

/* セル */
.slot-cell {
  min-height: 48px;
  border-radius: 8px;
  padding: 4px;
  font-size: .58rem;
  background: #f5f7fc;
  border: 1.5px solid transparent;
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
}
.slot-cell.weekend-sun { background: #fff5f5; }
.slot-cell.weekend-sat { background: #f5f0ff; }

/* バッジ */
.person-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  border-radius: 4px;
  padding: 1px 4px;
  font-size: .55rem;
  font-weight: 700;
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* 統計 */
.stats-section {
  background: white;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 16px;
  box-shadow: 0 2px 10px rgba(26,58,107,0.08);
}
.stats-title {
  font-size: .9rem;
  font-weight: 900;
  color: var(--navy);
  margin-bottom: 10px;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}
.stat-card {
  border-radius: 10px;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.stat-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .85rem;
  font-weight: 900;
  flex-shrink: 0;
}
.stat-name { font-size: .75rem; font-weight: 700; }
.stat-count { font-size: .65rem; color: var(--muted); }

/* ローディング */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: .9rem;
}
.loading-dots::after {
  content: '';
  animation: dots 1.2s steps(3, end) infinite;
}
@keyframes dots {
  0%, 20% { content: '.'; }
  40% { content: '..'; }
  60%, 100% { content: '...'; }
}

/* フッター */
.app-footer {
  text-align: center;
  font-size: .72rem;
  color: var(--muted);
  margin-top: 8px;
  padding-bottom: 20px;
}

/* ステータスメッセージ */
.status-msg {
  text-align: center;
  padding: 12px;
  border-radius: 10px;
  font-size: .8rem;
  margin-bottom: 12px;
}
.status-msg.info { background: var(--pale); color: var(--navy); }
.status-msg.warn { background: #fff8e0; color: #8a6c00; }
.status-msg.error { background: #fde8e8; color: #c0392b; }
</style>
</head>
<body>

<div class="app-header">
  <h1>🏀 バスケ部 8月 <span>当番表</span></h1>
  <div class="subtitle">西武文理バスケ合宿サポーター 2026年8月</div>
</div>

<!-- イベント選択 -->
<div class="event-selector">
  <label>📋 イベントを選択</label>
  <select id="eventSelect">
    <option value="">読み込み中...</option>
  </select>
  <button class="reload-btn" onclick="reloadData()">🔄 最新データを取得</button>
</div>

<div id="statusMsg"></div>

<!-- カレンダー -->
<div id="calendarArea">
  <div class="loading">データを読み込み中<span class="loading-dots"></span></div>
</div>

<!-- 統計 -->
<div id="statsArea"></div>

<div class="app-footer">🏀 バスケ部 当番表 2026</div>

<script>
// ==================== 設定 ====================
const WEEK2 = [
  { date:'8/9',  label:'8/9(日)',  dow:'sun' },
  { date:'8/10', label:'8/10(月)', dow:'week' },
  { date:'8/11', label:'8/11(火)', dow:'week' },
  { date:'8/12', label:'8/12(水)', dow:'week' },
  { date:'8/13', label:'8/13(木)', dow:'week' },
  { date:'8/14', label:'8/14(金)', dow:'week' },
  { date:'8/15', label:'8/15(土)', dow:'sat' },
];
const WEEK3 = [
  { date:'8/16', label:'8/16(日)', dow:'sun' },
  { date:'8/17', label:'8/17(月)', dow:'week' },
  { date:'8/18', label:'8/18(火)', dow:'week' },
  { date:'8/19', label:'8/19(水)', dow:'week' },
  { date:'8/20', label:'8/20(木)', dow:'week' },
  { date:'8/21', label:'8/21(金)', dow:'week' },
  { date:'8/22', label:'8/22(土)', dow:'sat' },
];

// 当番スロット（文理バスケと同じ）
// 当番スロット（seibu-supportersのdata-t値と完全一致させる）
const SLOTS = [
  { key:'1事前準備',           label:'①事前準備' },
  { key:'2本部 8:30〜11:00',   label:'②本部\n8:30〜11:00' },
  { key:'3本部 11:00〜13:30',  label:'③本部\n11:00〜13:30' },
  { key:'4本部 13:30〜16:00',  label:'④本部\n13:30〜16:00' },
  { key:'5本部 16:00〜18:30',  label:'⑤本部\n16:00〜18:30' },
  { key:'6本部 終日 8:30〜18:30', label:'⑥本部(終日)\n8:30〜18:30' },
  { key:'7食堂 10:00〜15:00',  label:'⑦食堂\n10:00〜15:00' },
  { key:'8弁当配達 10:30〜',   label:'⑧弁当配達\n10:30〜' },
];

// カラーパレット
const COLORS = [
  { bg:'#fde8f0', text:'#8b0032', dot:'#d91b6a' },
  { bg:'#e8f0fd', text:'#002f8b', dot:'#1b4dd9' },
  { bg:'#e8fdf0', text:'#007830', dot:'#1bd95c' },
  { bg:'#fdf0e8', text:'#7a2d00', dot:'#d96b1b' },
  { bg:'#f5e8fd', text:'#4a007a', dot:'#9b1bd9' },
  { bg:'#e8fdfc', text:'#006b6b', dot:'#1bd9d9' },
  { bg:'#fdfde8', text:'#6b6b00', dot:'#c4c41b' },
  { bg:'#fde8e8', text:'#7a0000', dot:'#d91b1b' },
  { bg:'#e8fdfd', text:'#003c7a', dot:'#1b7ad9' },
  { bg:'#f0fde8', text:'#1e6b00', dot:'#3fd91b' },
];

// ==================== 状態 ====================
let currentRecords = [];
let personColorMap = {};
let colorIdx = 0;

// ==================== API ====================
async function fetchEvents() {
  try {
    const res = await fetch('/api/seibu/events');
    if (!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    return data;
  } catch(e) {
    console.error(e);
    return null;
  }
}

async function fetchEventRecords(eventId) {
  try {
    const res = await fetch('/api/seibu/events/' + eventId);
    if (!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    return data.records || [];
  } catch(e) {
    console.error(e);
    return null;
  }
}

// ==================== 初期化 ====================
async function init() {
  showStatus('イベント一覧を取得中...', 'info');
  const events = await fetchEvents();
  const sel = document.getElementById('eventSelect');
  
  if (!events || typeof events !== 'object') {
    sel.innerHTML = '<option value="">取得失敗 - イベントがありません</option>';
    showStatus('❌ イベント情報を取得できませんでした。ネットワーク接続を確認してください。', 'error');
    document.getElementById('calendarArea').innerHTML = getOfflineCalendar();
    return;
  }

  // eventsはオブジェクト or 配列
  const eventList = Array.isArray(events) ? events : Object.values(events);
  const aug = eventList.filter(e => {
    // 8月のイベントを優先
    if (e.date && e.date.includes('2026-08')) return true;
    return true; // 全部表示
  });

  if (aug.length === 0) {
    sel.innerHTML = '<option value="">イベントが登録されていません</option>';
    showStatus('⚠️ 文理バスケアプリにイベントが登録されていません。', 'warn');
    document.getElementById('calendarArea').innerHTML = getOfflineCalendar();
    return;
  }

  sel.innerHTML = aug.map(e =>
    `<option value="${e.id}">${e.title || e.id}${e.date ? ' ('+e.date+')' : ''}</option>`
  ).join('');

  clearStatus();
  await loadEvent(aug[0].id);
  
  sel.addEventListener('change', () => {
    if (sel.value) loadEvent(sel.value);
  });
}

async function loadEvent(eventId) {
  showStatus('登録データを取得中...', 'info');
  const records = await fetchEventRecords(eventId);
  
  if (!records) {
    showStatus('❌ 登録データを取得できませんでした。', 'error');
    document.getElementById('calendarArea').innerHTML = getOfflineCalendar();
    return;
  }
  
  clearStatus();
  currentRecords = records;
  buildPersonColors(records);
  renderCalendar(records);
  renderStats(records);
}

async function reloadData() {
  const sel = document.getElementById('eventSelect');
  if (sel.value) {
    await loadEvent(sel.value);
  } else {
    await init();
  }
}

// ==================== カラーマップ ====================
function buildPersonColors(records) {
  colorIdx = 0;
  personColorMap = {};
  records.forEach(r => {
    const name = r.studentName || r.name || '不明';
    if (!personColorMap[name]) {
      personColorMap[name] = COLORS[colorIdx % COLORS.length];
      colorIdx++;
    }
  });
}

function getColor(name) {
  if (!personColorMap[name]) {
    personColorMap[name] = COLORS[colorIdx % COLORS.length];
    colorIdx++;
  }
  return personColorMap[name];
}

// ==================== カレンダー描画 ====================
function getRegisteredPeopleForSlot(records, date, slotKey) {
  const people = [];
  records.forEach(r => {
    const name = r.studentName || r.name || '不明';
    (r.dates || []).forEach(d => {
      if (d.date === date && d.time === slotKey) {
        people.push(name);
      }
    });
  });
  return people;
}

// デバッグ用
function debugRecords(records) {
  console.log('=== 登録データ件数:', records.length);
  records.slice(0, 5).forEach(r => {
    console.log('名前:', r.studentName || r.name);
    (r.dates || []).forEach(d => {
      console.log('  date:', JSON.stringify(d.date), '/ time:', JSON.stringify(d.time));
    });
  });
  console.log('=== SLOTSキー:');
  SLOTS.forEach(s => console.log(' key=', JSON.stringify(s.key)));
}

function renderWeek(weeks, title, records) {
  let html = `<div class="cal-section"><div class="cal-section-title">📅 ${title}</div>`;
  
  // 曜日ヘッダー
  html += `<div class="day-header-row">
    <div class="slot-label-header"></div>`;
  weeks.forEach(d => {
    html += `<div class="day-header ${d.dow}">${d.label}</div>`;
  });
  html += '</div>';
  
  // スロット行
  SLOTS.forEach(slot => {
    html += `<div class="slot-row">
      <div class="slot-label">${slot.label.replace('\n', '<br>')}</div>`;
    weeks.forEach(d => {
      const people = getRegisteredPeopleForSlot(records, d.date, slot.key);
      const cls = d.dow === 'sun' ? 'weekend-sun' : d.dow === 'sat' ? 'weekend-sat' : '';
      html += `<div class="slot-cell ${cls}">`;
      people.forEach(name => {
        const c = getColor(name);
        html += `<span class="person-badge" style="background:${c.bg};color:${c.text}">${shortName(name)}</span>`;
      });
      html += '</div>';
    });
    html += '</div>';
  });
  
  html += '</div>';
  return html;
}

function shortName(name) {
  // 名前を短縮（8文字以上は省略）
  if (name.length <= 5) return name;
  return name.slice(0, 4) + '…';
}

function renderCalendar(records) {
  debugRecords(records);
  let html = '';
  
  // 凡例
  if (Object.keys(personColorMap).length > 0) {
    html += '<div class="legend">';
    Object.entries(personColorMap).forEach(([name, c]) => {
      html += `<div class="legend-item"><div class="legend-dot" style="background:${c.dot}"></div>${name}</div>`;
    });
    html += '</div>';
  }
  
  html += renderWeek(WEEK2, '8/9週（8/9〜8/15）', records);
  html += renderWeek(WEEK3, '8/16週（8/16〜8/22）', records);
  
  if (records.length === 0) {
    html += '<div class="status-msg info">📋 まだ登録者がいません</div>';
  }
  
  document.getElementById('calendarArea').innerHTML = html;
}

// ==================== 統計 ====================
function renderStats(records) {
  if (records.length === 0) {
    document.getElementById('statsArea').innerHTML = '';
    return;
  }
  
  // 担当コマ数を集計
  const counts = {};
  records.forEach(r => {
    const name = r.studentName || r.name || '不明';
    counts[name] = (counts[name] || 0) + (r.dates ? r.dates.length : 0);
  });
  
  let html = `<div class="stats-section">
    <div class="stats-title">👥 担当者一覧</div>
    <div class="stats-grid">`;
  
  Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([name, cnt]) => {
    const c = getColor(name);
    const initial = name.charAt(0);
    html += `<div class="stat-card" style="background:${c.bg}">
      <div class="stat-avatar" style="background:${c.dot};color:white">${initial}</div>
      <div>
        <div class="stat-name" style="color:${c.text}">${name}</div>
        <div class="stat-count">${cnt} コマ担当</div>
      </div>
    </div>`;
  });
  
  html += '</div></div>';
  document.getElementById('statsArea').innerHTML = html;
}

// ==================== オフライン用カレンダー ====================
function getOfflineCalendar() {
  // APIが使えないときの空カレンダー
  buildPersonColors([]);
  let html = renderWeek(WEEK2, '8/9週（8/9〜8/15）', []);
  html += renderWeek(WEEK3, '8/16週（8/16〜8/22）', []);
  html += '<div class="status-msg warn">💡 文理バスケアプリから登録すると、ここに自動で当番が表示されます</div>';
  return html;
}

// ==================== ユーティリティ ====================
function showStatus(msg, type='info') {
  document.getElementById('statusMsg').innerHTML =
    `<div class="status-msg ${type}">${msg}</div>`;
}
function clearStatus() {
  document.getElementById('statusMsg').innerHTML = '';
}

// ==================== 起動 ====================
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
