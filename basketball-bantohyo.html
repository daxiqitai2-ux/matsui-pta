<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>バスケ部 8月 当番表（本部用）</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --navy:#1a3a6b; --gold:#c8a200; --sky:#4a90d9; --pale:#e8f0fb; --muted:#7a8a99; --border:#d0d8e8; }
body { font-family:'Zen Maru Gothic',sans-serif; background:linear-gradient(135deg,#e8f0fb 0%,#f0f4fb 60%,#fff8ef 100%); min-height:100vh; padding:16px; }

.app-header { text-align:center; padding:20px 16px 16px; background:white; border-radius:20px; margin-bottom:16px; box-shadow:0 3px 16px rgba(26,58,107,.12); position:relative; overflow:hidden; }
.app-header::before { content:''; position:absolute; top:0;left:0;right:0; height:5px; background:linear-gradient(90deg,var(--navy),var(--gold),var(--sky)); }
.app-header h1 { font-size:1.3rem; font-weight:900; color:var(--navy); }
.app-header h1 span { color:var(--gold); }
.app-header .subtitle { font-size:.78rem; color:var(--muted); margin-top:4px; }

.event-selector { background:white; border-radius:16px; padding:14px 16px; margin-bottom:16px; box-shadow:0 2px 10px rgba(26,58,107,.08); }
.event-selector label { font-size:.78rem; font-weight:700; color:var(--navy); display:block; margin-bottom:6px; }
.event-selector select { width:100%; padding:10px 12px; border-radius:10px; border:1.5px solid var(--border); font-family:'Zen Maru Gothic',sans-serif; font-size:.85rem; color:var(--navy); background:var(--pale); outline:none; }
.reload-btn { display:block; width:100%; margin-top:10px; padding:10px; border:none; border-radius:10px; background:linear-gradient(135deg,var(--navy),var(--sky)); color:white; font-family:'Zen Maru Gothic',sans-serif; font-size:.85rem; font-weight:700; cursor:pointer; }

.legend { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:.7rem; color:var(--muted); background:white; border-radius:20px; padding:3px 8px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.legend-dot { width:10px; height:10px; border-radius:50%; }

.cal-section { background:white; border-radius:16px; padding:14px; margin-bottom:16px; box-shadow:0 2px 10px rgba(26,58,107,.08); }
.cal-section-title { font-size:.9rem; font-weight:900; color:var(--navy); margin-bottom:10px; padding-bottom:8px; border-bottom:2px solid var(--pale); }
.day-header-row { display:grid; grid-template-columns:80px repeat(7,1fr); gap:3px; margin-bottom:4px; }
.day-header { text-align:center; font-size:.68rem; font-weight:700; padding:4px 2px; border-radius:8px; }
.day-header.sun { background:#fde8e8; color:#c0392b; }
.day-header.sat { background:#e8f0fb; color:#2563b5; }
.day-header.week { background:var(--pale); color:var(--navy); }
.slot-row { display:grid; grid-template-columns:80px repeat(7,1fr); gap:3px; margin-bottom:3px; }
.slot-label { font-size:.62rem; color:var(--muted); font-weight:700; display:flex; align-items:center; padding:4px 2px 4px 4px; background:var(--pale); border-radius:8px; line-height:1.3; }
.slot-cell { min-height:48px; border-radius:8px; padding:4px; background:#f5f7fc; display:flex; flex-direction:column; gap:2px; }
.slot-cell.weekend-sun { background:#fff5f5; }
.slot-cell.weekend-sat { background:#f5f0ff; }
.person-badge { display:block; border-radius:4px; padding:2px 4px; font-size:.52rem; font-weight:700; line-height:1.4; word-break:break-all; width:100%; }
.edit-btn { display:block; font-size:.65rem; color:#aaa; cursor:pointer; user-select:none; text-align:center; margin-top:2px; }
.edit-btn:hover { color:var(--navy); }

.stats-section { background:white; border-radius:16px; padding:14px; margin-bottom:16px; box-shadow:0 2px 10px rgba(26,58,107,.08); }
.stats-title { font-size:.9rem; font-weight:900; color:var(--navy); margin-bottom:10px; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
.stat-card { border-radius:10px; padding:10px; display:flex; align-items:center; gap:8px; }
.stat-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.85rem; font-weight:900; flex-shrink:0; color:white; }
.stat-name { font-size:.75rem; font-weight:700; }
.stat-count { font-size:.65rem; color:var(--muted); }

.loading { text-align:center; padding:40px; color:var(--muted); }
.app-footer { text-align:center; font-size:.72rem; color:var(--muted); margin-top:8px; padding-bottom:20px; }
.status-msg { text-align:center; padding:12px; border-radius:10px; font-size:.8rem; margin-bottom:12px; }
.status-msg.info { background:var(--pale); color:var(--navy); }
.status-msg.error { background:#fde8e8; color:#c0392b; }

/* モーダル */
#editModal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.45); z-index:200;
  align-items:center; justify-content:center;
}
.modal-box { background:white; border-radius:20px; padding:20px; width:90%; max-width:360px; box-shadow:0 8px 32px rgba(0,0,0,.2); }
.modal-title { font-size:.95rem; font-weight:900; color:var(--navy); margin-bottom:14px; }
.modal-list { margin-bottom:14px; min-height:20px; }
.modal-person { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-radius:8px; margin-bottom:6px; font-size:.82rem; font-weight:700; }
.modal-person { cursor:pointer; }
.modal-person:hover { opacity:.75; }
.modal-del { display:none; }
.modal-person-hint { font-size:.65rem; color:var(--muted); margin-left:6px; }
.modal-add-row { display:flex; gap:6px; margin-bottom:12px; align-items:center; }
.modal-add-row input { flex:1; padding:9px 10px; border:1.5px solid var(--border); border-radius:8px; font-family:'Zen Maru Gothic',sans-serif; font-size:.85rem; outline:none; }
.modal-add-row select { padding:9px 6px; border:1.5px solid var(--border); border-radius:8px; font-family:'Zen Maru Gothic',sans-serif; font-size:.85rem; background:var(--pale); outline:none; }
.modal-add-btn { padding:9px 14px; border:none; border-radius:8px; background:var(--navy); color:white; font-family:'Zen Maru Gothic',sans-serif; font-size:.85rem; font-weight:700; cursor:pointer; white-space:nowrap; }
.modal-close-btn { display:block; width:100%; padding:11px; border:none; border-radius:10px; background:var(--pale); color:var(--navy); font-family:'Zen Maru Gothic',sans-serif; font-size:.85rem; font-weight:700; cursor:pointer; margin-top:8px; }
</style>
</head>
<body>

<div class="app-header">
  <h1>🏀 バスケ部 8月 <span>当番表</span>（本部用）</h1>
  <div class="subtitle">西武文理バスケ合宿サポーター 2026年8月</div>
</div>

<div class="event-selector">
  <label>📋 イベントを選択</label>
  <select id="eventSelect"><option value="">読み込み中...</option></select>
  <button class="reload-btn" id="reloadBtn">🔄 最新データを取得</button>
</div>

<div id="statusMsg"></div>
<div id="calendarArea"><div class="loading">データを読み込み中...</div></div>
<div id="statsArea"></div>
<div class="app-footer">🏀 バスケ部 当番表 2026（本部用）</div>

<!-- モーダル -->
<div id="editModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">✏️ 担当者編集</div>
    <div class="modal-list" id="modalList"></div>
    <div class="modal-add-row">
      <input type="text" id="modalInput" placeholder="名前を入力" />
      <select id="modalParent">
        <option value="父">父</option>
        <option value="母">母</option>
      </select>
      <button class="modal-add-btn" id="modalAddBtn">登録</button>
    </div>
    <button class="modal-close-btn" id="modalCloseBtn">閉じる</button>
  </div>
</div>

<script>
const WEEK2 = [
  {date:'8/9',  label:'8/9(日)',  dow:'sun'},
  {date:'8/10', label:'8/10(月)', dow:'week'},
  {date:'8/11', label:'8/11(火)', dow:'week'},
  {date:'8/12', label:'8/12(水)', dow:'week'},
  {date:'8/13', label:'8/13(木)', dow:'week'},
  {date:'8/14', label:'8/14(金)', dow:'week'},
  {date:'8/15', label:'8/15(土)', dow:'sat'},
];
const WEEK3 = [
  {date:'8/16', label:'8/16(日)', dow:'sun'},
  {date:'8/17', label:'8/17(月)', dow:'week'},
  {date:'8/18', label:'8/18(火)', dow:'week'},
  {date:'8/19', label:'8/19(水)', dow:'week'},
  {date:'8/20', label:'8/20(木)', dow:'week'},
  {date:'8/21', label:'8/21(金)', dow:'week'},
  {date:'8/22', label:'8/22(土)', dow:'sat'},
];
const SLOTS = [
  {key:'1事前準備',               label:'①事前準備'},
  {key:'2本部 8:30〜11:00',      label:'②本部\n8:30〜11:00'},
  {key:'3本部 11:00〜13:30',     label:'③本部\n11:00〜13:30'},
  {key:'4本部 13:30〜16:00',     label:'④本部\n13:30〜16:00'},
  {key:'5本部 16:00〜18:30',     label:'⑤本部\n16:00〜18:30'},
  {key:'6本部 終日 8:30〜18:30', label:'⑥本部(終日)\n8:30〜18:30'},
  {key:'7食堂 10:00〜15:00',     label:'⑦食堂\n10:00〜15:00'},
  {key:'8弁当配達 10:30〜',      label:'⑧弁当配達\n10:30〜'},
];

const CF = {text:'#1e3a8a', dot:'#3b82f6'};
const CM = {text:'#9d174d', dot:'#ec4899'};
const CO = {text:'#374151', dot:'#9ca3af'};

// 学年背景色
const GRADE_BG = {
  '1年': {bg:'#bfefff', border:'#5bc8f5'},
  '2年': {bg:'#ede9fe', border:'#a78bfa'},
  '3年': {bg:'#fecaca', border:'#f87171'},
};
function gradeBg(grade) {
  return GRADE_BG[grade] || {bg:'#f3f4f6', border:'#d1d5db'};
}
function colorOf(p){ return p==='父'?CF:p==='母'?CM:CO; }

let currentRecords = [];
let manualData = {};
let deletedKeys = []; // API登録者の削除リスト
let currentEventId = '';
let modalDate = '';
let modalSlotIdx = 0;

// ===== API =====
async function fetchEvents() {
  try { const r=await fetch('/api/seibu/events'); return r.ok?await r.json():null; } catch(e){return null;}
}
async function fetchManualData(id) {
  try {
    const r = await fetch('/api/seibu/manual/'+id);
    if (!r.ok) return {};
    const data = await r.json();
    // deletedKeysも復元
    deletedKeys = data.__deleted || [];
    delete data.__deleted;
    return data;
  } catch(e){ return {}; }
}

async function fetchEventRecords(id) {
  try { const r=await fetch('/api/seibu/events/'+id); if(!r.ok)return null; const d=await r.json(); return d.records||[]; } catch(e){return null;}
}

// ===== 初期化 =====
async function init() {
  showStatus('取得中...','info');
  const events = await fetchEvents();
  const sel = document.getElementById('eventSelect');
  if (!events) { sel.innerHTML='<option>取得失敗</option>'; showStatus('❌ 取得失敗','error'); renderCalendar([]); return; }
  const list = (Array.isArray(events)?events:Object.values(events)).sort((a,b)=>(b.id||'').localeCompare(a.id||''));
  if (!list.length) { sel.innerHTML='<option>イベントなし</option>'; renderCalendar([]); return; }
  sel.innerHTML = list.map(e=>'<option value="'+e.id+'">'+(e.title||e.id)+'</option>').join('');
  clearStatus();
  await loadEvent(list[0].id);
}

async function loadEvent(id) {
  showStatus('データ取得中...','info');
  let records, manual;
  try {
    [records, manual] = await Promise.all([
      fetchEventRecords(id),
      fetchManualData(id),
    ]);
  } catch(e) {
    records = await fetchEventRecords(id);
    manual = {};
  }
  if (!records) { showStatus('❌ データ取得失敗','error'); renderCalendar([]); return; }
  clearStatus();
  // datesを日付順にソート
  records.forEach(r => {
    if (r.dates) r.dates.sort((a,b) => (a.rawDate||a.date) < (b.rawDate||b.date) ? -1 : 1);
  });
  currentRecords = records;
  manualData = manual || {};
  currentEventId = id;
  console.log('records件数:', records.length, 'サンプル:', JSON.stringify(records[0]));
  renderCalendar(records);
  renderStats(records);
}

// ===== カレンダー =====
function getPeople(date, slotKey) {
  const people = [];
  currentRecords.forEach(r => {
    const name = r.studentName||r.name||'不明';
    const parent = r.parent||'';
    const grade = r.grade||'';
    (r.dates||[]).forEach(d => {
      if(d.date===date&&d.time===slotKey) {
        const dkey = date+'|||'+slotKey+'|||'+name+'|||'+parent;
        if(!deletedKeys.includes(dkey)) people.push({name,parent,grade,manual:false});
      }
    });
  });
  const mkey = date+'|||'+slotKey;
  (manualData[mkey]||[]).forEach(m=>people.push({...m,manual:true}));
  return people;
}

function renderWeek(weeks, title) {
  let h = '<div class="cal-section"><div class="cal-section-title">📅 '+title+'</div>';
  h += '<div class="day-header-row"><div></div>';
  weeks.forEach(d=>{ h+='<div class="day-header '+d.dow+'">'+d.label+'</div>'; });
  h += '</div>';
  SLOTS.forEach((slot,si)=>{
    h += '<div class="slot-row"><div class="slot-label">'+slot.label.replace('\n','<br>')+'</div>';
    weeks.forEach((d,di)=>{
      const people = getPeople(d.date, slot.key);
      const cls = d.dow==='sun'?'weekend-sun':d.dow==='sat'?'weekend-sat':'';
      const weekIdx = weeks===WEEK2?2:3;
      h += '<div class="slot-cell '+cls+'">';
      people.forEach(p=>{
        const c = colorOf(p.parent);
        const gb=gradeBg(p.grade); h += '<span class="person-badge" style="background:'+gb.bg+';color:'+c.text+';border:1.5px solid '+gb.border+'">'+p.name+'<br><span style="font-size:.5rem;opacity:.8">'+( p.parent||'?')+'</span></span>';
      });
      h += '<span class="edit-btn" data-week="'+weekIdx+'" data-di="'+di+'" data-si="'+si+'">＋</span>';
      h += '</div>';
    });
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function renderCalendar(records) {
  let h = '<div class="legend">';
  h += '<div class="legend-item"><div class="legend-dot" style="background:#bfefff;border:1.5px solid #5bc8f5"></div>1年</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:#ede9fe;border:1.5px solid #a78bfa"></div>2年</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:#fecaca;border:1.5px solid #f87171"></div>3年</div>';
  h += '<div class="legend-item" style="font-size:.65rem"><span style="color:#1e3a8a;font-weight:700">文字色：父</span>　<span style="color:#9d174d;font-weight:700">母</span></div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:'+CO.dot+'"></div>手動入力</div>';
  h += '</div>';
  h += renderWeek(WEEK2,'8/9週（8/9〜8/15）');
  document.getElementById('calendarArea').innerHTML = h;

  // edit-btnにイベントリスナーを設定
  document.querySelectorAll('.edit-btn').forEach(btn=>{
    btn.addEventListener('click', function(){
      const weekIdx = parseInt(this.getAttribute('data-week'));
      const di = parseInt(this.getAttribute('data-di'));
      const si = parseInt(this.getAttribute('data-si'));
      const week = weekIdx===2?WEEK2:WEEK3;
      openModal(week[di].date, si);
    });
  });
}

// ===== 統計 =====
function renderStats(records) {
  const counts = {};
  const GRADE_ORDER = ['3年','2年','1年'];
  records.forEach(r=>{
    const name=r.studentName||r.name||'不明';
    const parent=r.parent||'';
    const grade=r.grade||'';
    const number=parseInt(r.number||'0')||0;
    const key=name+'___'+parent;
    if(!counts[key]) counts[key]={name,parent,grade,number,cnt:0};
    // deletedKeysを除外してカウント
    const activeDates=(r.dates||[]).filter(d=>{
      const dkey=d.date+'|||'+d.time+'|||'+name+'|||'+parent;
      return !deletedKeys.includes(dkey);
    });
    counts[key].cnt+=activeDates.length;
  });
  Object.values(manualData).forEach(people=>{
    people.forEach(p=>{
      const key=p.name+'___'+p.parent;
      if(!counts[key]) counts[key]={name:p.name,parent:p.parent,cnt:0};
      counts[key].cnt+=1;
    });
  });
  if(!Object.keys(counts).length){document.getElementById('statsArea').innerHTML='';return;}
  let h='<div class="stats-section"><div class="stats-title">👥 担当者一覧</div><div class="stats-grid">';
  Object.values(counts).filter(info=>info.cnt>0).sort((a,b)=>{
    const gi = GRADE_ORDER.indexOf(a.grade) - GRADE_ORDER.indexOf(b.grade);
    if(gi!==0) return gi;
    return a.number - b.number;
  }).forEach(info=>{
    const c=colorOf(info.parent);
    h+='<div class="stat-card" style="background:'+c.bg+'">';
    h+='<div class="stat-avatar" style="background:'+c.dot+'">'+info.name.charAt(0)+'</div>';
    h+='<div><div class="stat-name" style="color:'+c.text+'">'+info.name+'（'+(info.parent||'?')+'）</div>';
    h+='<div class="stat-count">'+info.cnt+' コマ担当</div></div></div>';
  });
  h+='</div></div>';
  document.getElementById('statsArea').innerHTML=h;
}

// ===== モーダル =====
function openModal(date, si) {
  modalDate = date;
  modalSlotIdx = si;
  const slot = SLOTS[si];
  document.getElementById('modalTitle').textContent = '✏️ '+date+' '+slot.label.replace('\n',' ');
  document.getElementById('modalInput').value = '';
  renderModalList();
  document.getElementById('editModal').style.display = 'flex';
}

function renderModalList() {
  const slot = SLOTS[modalSlotIdx];
  const mkey = modalDate+'|||'+slot.key;
  const apiPeople = [];
  currentRecords.forEach(r=>{
    const name=r.studentName||r.name||'不明';
    const parent=r.parent||'';
    (r.dates||[]).forEach(d=>{
      if(d.date===modalDate&&d.time===slot.key) apiPeople.push({name,parent});
    });
  });
  const manualPeople = manualData[mkey]||[];
  let h='';
  apiPeople.forEach((p,i)=>{
    const c=colorOf(p.parent);
    h+='<div class="modal-person" style="background:'+c.bg+';color:'+c.text+'" data-type="api" data-idx="'+i+'">';
    h+='<span>'+p.name+'（'+(p.parent||'?')+'）</span>';
    h+='<span class="modal-person-hint">タップで削除</span></div>';
  });
  manualPeople.forEach((p,i)=>{
    const c=colorOf(p.parent);
    h+='<div class="modal-person" style="background:'+c.bg+';color:'+c.text+'" data-type="manual" data-idx="'+i+'">';
    h+='<span>'+p.name+'（'+p.parent+'）</span>';
    h+='<span class="modal-person-hint">タップで削除</span></div>';
  });
  if(!h) h='<div style="color:var(--muted);font-size:.8rem;padding:4px">まだ登録なし</div>';
  document.getElementById('modalList').innerHTML=h;

  // 名前クリックで削除
  document.querySelectorAll('.modal-person').forEach(btn=>{
    btn.addEventListener('click', function(){
      const type2 = this.getAttribute('data-type');
      const pname = this.querySelector('span').textContent;
      if(!confirm(pname + 'を削除します。\n復活させることはできません。\nよろしいですか？')) return;
      const type = this.getAttribute('data-type');
      const idx = parseInt(this.getAttribute('data-idx'));
      const slot = SLOTS[modalSlotIdx];
      const mkey = modalDate+'|||'+slot.key;
      if(type==='manual'){
        manualData[mkey].splice(idx,1);
        saveManualData();
      } else {
        // APIデータの削除はdeletedKeysに追加して非表示にする
        let count=0;
        currentRecords.forEach(r=>{
          const name=r.studentName||r.name||'不明';
          const parent=r.parent||'';
          (r.dates||[]).forEach(d=>{
            if(d.date===modalDate&&d.time===slot.key){
              if(count===idx){
                const dkey=modalDate+'|||'+slot.key+'|||'+name+'|||'+parent;
                if(!deletedKeys.includes(dkey)) deletedKeys.push(dkey);
                count++;
              } else { count++; }
            }
          });
        });
        saveManualData();
      }
      renderModalList();
      renderCalendar(currentRecords);
      renderStats(currentRecords);
    });
  });
}

async function saveManualData() {
  if (!currentEventId) return;
  try {
    const saveData = {...manualData, __deleted: deletedKeys};
    await fetch('/api/seibu/manual/'+currentEventId, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(saveData),
    });
  } catch(e) { console.error('保存失敗',e); }
}

function addManual() {
  const name = document.getElementById('modalInput').value.trim();
  const parent = document.getElementById('modalParent').value;
  if(!name) return;
  const mkey = modalDate+'|||'+SLOTS[modalSlotIdx].key;
  if(!manualData[mkey]) manualData[mkey]=[];
  manualData[mkey].push({name,parent});
  document.getElementById('modalInput').value='';
  renderCalendar(currentRecords);
  renderStats(currentRecords);
  saveManualData();
  closeModal();
}

function closeModal() {
  document.getElementById('editModal').style.display='none';
}

function showStatus(msg,type){ document.getElementById('statusMsg').innerHTML='<div class="status-msg '+type+'">'+msg+'</div>'; }
function clearStatus(){ document.getElementById('statusMsg').innerHTML=''; }

// ===== イベント設定 =====
window.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('reloadBtn').addEventListener('click', async()=>{
    const sel=document.getElementById('eventSelect');
    if(sel.value) await loadEvent(sel.value); else await init();
  });
  document.getElementById('eventSelect').addEventListener('change', function(){
    if(this.value) loadEvent(this.value);
  });
  document.getElementById('modalAddBtn').addEventListener('click', addManual);
  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  document.getElementById('modalInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addManual(); });
  document.getElementById('editModal').addEventListener('click', function(e){
    if(e.target===this) closeModal();
  });

  init();
  setInterval(async()=>{
    const sel=document.getElementById('eventSelect');
    if(sel&&sel.value) await loadEvent(sel.value);
  }, 30000);
});
</script>
</body>
</html>
