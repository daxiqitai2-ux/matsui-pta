<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PTA 出欠管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{--forest:#2e6b4f;--lg:#e8f4ec;--cream:#ede8de;--paper:#f7f2ea;--border:#cec8bc;--muted:#887f74;--amber:#c96a1e;--red:#b83232;--ink:#1e1a17;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.topbar{background:var(--forest);color:#fff;height:52px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.topbar h1{font-size:1rem;font-weight:700;letter-spacing:.04em;}
.pill{font-size:.7rem;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 10px;}
.tabs{display:flex;border-bottom:2px solid var(--border);background:#fff;}
.tab{flex:1;padding:12px 4px;border:none;background:none;font-family:'Noto Sans JP',sans-serif;font-size:.78rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:color .15s,border-color .15s;}
.tab.on{color:var(--forest);border-bottom-color:var(--forest);}
.page{padding:18px 16px;max-width:640px;margin:0 auto;}
.card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.04);}
.card-head{font-size:.95rem;font-weight:700;color:var(--forest);margin-bottom:14px;}
.lbl{font-size:.76rem;color:var(--muted);margin-bottom:4px;}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.92rem;font-family:'Noto Sans JP',sans-serif;background:var(--paper);outline:none;}
.inp:focus{border-color:var(--forest);}
.row{display:flex;gap:8px;margin-bottom:10px;}
.hr{border:none;border-top:1.5px solid var(--border);margin:14px 0;}
.mt8{margin-top:8px;}
.btn{padding:10px 18px;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:.86rem;cursor:pointer;white-space:nowrap;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-green{background:var(--forest);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-ghost{background:var(--cream);color:var(--ink);}
.btn-sm{padding:6px 12px;font-size:.76rem;}
.btn-full{width:100%;}
.m-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;background:var(--cream);margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;}
.m-item:hover{background:#e3ddd2;}
.m-item.sel{background:var(--lg);border-color:var(--forest);}
.m-name{font-weight:700;font-size:.92rem;}
.m-sub{font-size:.74rem;color:var(--muted);margin-top:2px;}
.badge{display:inline-block;background:var(--forest);color:#fff;border-radius:20px;padding:2px 10px;font-size:.7rem;font-weight:700;}
.url-box{background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:.78rem;word-break:break-all;color:var(--ink);margin:10px 0;}
.url-label{font-size:.72rem;color:var(--muted);margin-bottom:4px;}
.stats{display:flex;gap:10px;margin-bottom:14px;}
.stat{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.stat-n{font-size:1.8rem;font-weight:700;color:var(--forest);}
.stat-l{font-size:.68rem;color:var(--muted);}
.att-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;margin-bottom:5px;font-size:.86rem;}
.att-p{background:var(--lg);}
.att-a{background:var(--cream);color:var(--muted);}
.att-time{font-size:.7rem;color:var(--muted);}
/* チェックインページ */
.ci-wrap{min-height:100vh;background:linear-gradient(150deg,#e8f4ec,#f7f2ea 60%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 18px;}
.ci-card{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:28px 22px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.08);}
.ci-title{font-size:1.3rem;font-weight:700;color:var(--forest);text-align:center;margin-bottom:4px;}
.ci-date{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:20px;}
.ci-lbl{font-size:.88rem;color:var(--muted);text-align:center;margin-bottom:14px;}
.ci-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-top:14px;}
/* ステップ表示 */
.steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px;}
.step{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;border:2px solid var(--border);color:var(--muted);}
.step.active{background:var(--forest);border-color:var(--forest);color:#fff;}
.step.done{background:var(--lg);border-color:var(--forest);color:var(--forest);}
.step-line{flex:1;height:2px;background:var(--border);max-width:30px;}
/* 選択グリッド */
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sel-btn{padding:14px 8px;border:2px solid var(--border);border-radius:12px;background:var(--paper);font-family:'Noto Sans JP',sans-serif;font-size:.9rem;font-weight:700;color:var(--ink);cursor:pointer;text-align:center;line-height:1.4;transition:background .15s,border-color .15s,transform .1s;}
.sel-btn:hover{background:var(--lg);border-color:var(--forest);}
.sel-btn:active{transform:scale(.95);}
.sel-btn.wide{grid-column:1/-1;}
/* クラスグリッド */
.class-section{margin-bottom:14px;}
.class-year{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.05em;}
.class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.class-btn{padding:14px 8px;border:2px solid var(--border);border-radius:12px;background:var(--paper);font-family:'Noto Sans JP',sans-serif;font-size:1rem;font-weight:700;color:var(--ink);cursor:pointer;text-align:center;transition:background .15s,border-color .15s,transform .1s;}
.class-btn:hover{background:var(--lg);border-color:var(--forest);}
.class-btn:active{transform:scale(.95);}
.class-btn.nakayoshi{grid-column:1/-1;}
/* 選択バッジ */
.selected-badge{display:inline-block;background:var(--lg);border:1.5px solid var(--forest);border-radius:20px;padding:4px 14px;font-size:.84rem;font-weight:700;color:var(--forest);margin-bottom:16px;}
/* 名前入力 */
.ci-inp{width:100%;padding:14px;border:2px solid var(--border);border-radius:12px;font-size:1.1rem;font-family:'Noto Sans JP',sans-serif;text-align:center;background:var(--paper);outline:none;margin-bottom:10px;}
.ci-inp:focus{border-color:var(--forest);}
.ci-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--forest);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}
.ci-btn:disabled{opacity:.35;cursor:not-allowed;}
.back-btn{background:none;border:none;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:.82rem;cursor:pointer;margin-bottom:12px;padding:4px 0;text-decoration:underline;}
/* splash */
.splash{position:fixed;inset:0;background:var(--forest);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:14px;z-index:999;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.splash-icon{font-size:4.5rem;}
.splash-name{font-size:1.9rem;font-weight:700;}
.splash-sub{font-size:.95rem;opacity:.8;}
.err-splash{position:fixed;inset:0;background:#fff2f2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:999;padding:24px;text-align:center;}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:.9rem;}
.hidden{display:none!important;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:.84rem;z-index:999;animation:fi .2s ease;}
@media print{.topbar,.tabs,.no-print{display:none!important;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── 役職マスタ（担当なし=クラスへ直行、担当あり=担当選択へ） ──
// hasTanto:true のものは担当選択ステップあり
const ROLES=[
  {name:'校長',     hasTanto:false},
  {name:'教頭',     hasTanto:false},
  {name:'教務主任', hasTanto:false},
  {name:'会長',     hasTanto:false},
  {name:'副会長',   hasTanto:false},
  {name:'監事',     hasTanto:false},
  {name:'会計幹事', hasTanto:false},
  {name:'幹事',     hasTanto:true, tantos:['110番','人権','広報','サポート','その他']},
  {name:'地区委員', hasTanto:false},
  {name:'学年委員', hasTanto:false},
  {name:'市子連',   hasTanto:false},
  {name:'まついちまつり', hasTanto:false},
];

// クラスマスタ（1〜5年2クラス、6年3クラス、なかよし）
const CLASSES=[
  {year:'1年生', list:['1-1','1-2']},
  {year:'2年生', list:['2-1','2-2']},
  {year:'3年生', list:['3-1','3-2']},
  {year:'4年生', list:['4-1','4-2']},
  {year:'5年生', list:['5-1','5-2']},
  {year:'6年生', list:['6-1','6-2','6-3']},
  {year:'特別支援', list:['なかよし']},
];

const params=new URLSearchParams(location.search);
const MID=params.get('meeting');
const $=id=>document.getElementById(id);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h)e.innerHTML=h;return e;};
const fmt=d=>d?new Date(d).toLocaleString('ja-JP',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
const nowt=()=>new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
function showToast(msg){const t=el('div','toast',msg);document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}

const api={
  async get(path){const r=await fetch('/api'+path);return r.json();},
  async post(path,body){const r=await fetch('/api'+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();},
  async put(path,body){const r=await fetch('/api'+path,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();},
  async del(path){const r=await fetch('/api'+path,{method:'DELETE'});return r.json();}
};

// ═══════════════════════════════
// チェックインページ
// ═══════════════════════════════
if(MID){
  $('app').innerHTML=`
  <div class="ci-wrap">
    <div style="font-size:2.2rem;margin-bottom:8px">🌿</div>
    <div class="ci-card">
      <div class="ci-title" id="ct">読み込み中...</div>
      <div class="ci-date" id="cd"></div>
      <div id="ci-memo"></div>
      <div id="ci-body"></div>
      <div class="ci-hint" id="ch"></div>
    </div>
  </div>`;

  let meeting=null;
  let selRole=null,selTanto=null,selClass=null;

  async function init(){
    try{
      meeting=await api.get('/meetings/'+MID);
      if(meeting.error){$('ct').textContent='QRコードが無効です';$('ct').style.color='var(--red)';return;}
      $('ct').textContent=meeting.title;
      $('cd').textContent=fmt(meeting.date);
      showMemo();
      upCount();
      showStepRole();
    }catch(e){$('ct').textContent='読み込みエラー';$('ct').style.color='var(--red)';}
  }

  function showMemo(){
    const memo=meeting&&meeting.memo?meeting.memo.trim():'';
    const box=$('ci-memo');if(!box)return;
    if(!memo){box.innerHTML='';return;}
    box.innerHTML=`<div style="background:var(--lg);border:1.5px solid #a8d5b5;border-radius:12px;padding:12px 14px;margin-bottom:16px;">
      <div style="font-size:.76rem;font-weight:700;color:var(--forest);margin-bottom:6px;">📋 連絡事項・議題</div>
      <div style="font-size:.86rem;line-height:1.8;white-space:pre-wrap;color:var(--ink)">${memo.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>`;
  }

  function upCount(){
    if(!meeting)return;
    const total=(meeting.records||[]).length;
    $('ch').textContent='本日の出席記録：'+total+'件';
  }

  // ステップ表示ヘルパー
  function stepBar(active){
    // active: 1=役職, 2=担当, 3=クラス, 4=名前
    const hasTanto=selRole&&selRole.hasTanto;
    const steps=hasTanto?['役職','担当','クラス','名前']:['役職','クラス','名前'];
    let html='<div class="steps">';
    steps.forEach((s,i)=>{
      const n=i+1;
      let cls='step';
      if(n<active)cls+=' done';
      else if(n===active)cls+=' active';
      html+=`<div class="${cls}">${n<active?'✓':n}</div>`;
      if(i<steps.length-1)html+='<div class="step-line"></div>';
    });
    html+='</div>';
    return html;
  }

  // ── ステップ1：役職選択 ──
  function showStepRole(){
    selRole=null;selTanto=null;selClass=null;
    const body=$('ci-body');
    body.innerHTML=stepBar(1)+`<div class="ci-lbl">① 役職を選んでください</div><div class="sel-grid" id="rg"></div>`;
    const rg=$('rg');
    ROLES.forEach(r=>{
      // 校長・教頭・教務主任は1列幅で、役員系は普通
      const btn=el('button','sel-btn',r.name);
      btn.onclick=()=>{
        selRole=r;
        if(r.hasTanto){showStepTanto();}
        else{showStepClass();}
      };
      rg.appendChild(btn);
    });
  }

  // ── ステップ2：担当選択（hasTanto=trueのみ） ──
  function showStepTanto(){
    const body=$('ci-body');
    body.innerHTML=stepBar(2)+
      `<button class="back-btn" id="backBtn">← 役職選択に戻る</button>`+
      `<div style="text-align:center;margin-bottom:12px"><span class="selected-badge">${selRole.name}</span></div>`+
      `<div class="ci-lbl">② 担当を選んでください</div>`+
      `<div class="sel-grid" id="tg"></div>`;
    $('backBtn').onclick=showStepRole;
    const tg=$('tg');
    selRole.tantos.forEach(t=>{
      const btn=el('button','sel-btn',t);
      btn.onclick=()=>{selTanto=t;showStepClass();};
      tg.appendChild(btn);
    });
  }

  // ── ステップ3：クラス選択 ──
  function showStepClass(){
    const stepNum=selRole.hasTanto?3:2;
    const body=$('ci-body');
    const label=selRole.hasTanto
      ?`<span class="selected-badge">${selRole.name}</span><span class="selected-badge" style="margin-left:6px">${selTanto}</span>`
      :`<span class="selected-badge">${selRole.name}</span>`;
    body.innerHTML=stepBar(stepNum)+
      `<button class="back-btn" id="backBtn">← ${selRole.hasTanto?'担当':'役職'}選択に戻る</button>`+
      `<div style="text-align:center;margin-bottom:12px">${label}</div>`+
      `<div class="ci-lbl">クラスを選んでください</div>`+
      `<div id="cg"></div>`;
    $('backBtn').onclick=()=>{selRole.hasTanto?showStepTanto():showStepRole();};
    const cg=$('cg');
    CLASSES.forEach(({year,list})=>{
      const sec=el('div','class-section');
      sec.innerHTML='<div class="class-year">'+year+'</div>';
      const grid=el('div','class-grid');
      list.forEach(cls=>{
        const btn=el('button','class-btn'+(cls==='なかよし'?' nakayoshi':''),cls);
        btn.onclick=()=>{selClass=cls;showStepName();};
        grid.appendChild(btn);
      });
      sec.appendChild(grid);
      cg.appendChild(sec);
    });
  }

  // ── ステップ4：名前入力 ──
  function showStepName(){
    const stepNum=selRole.hasTanto?4:3;
    const body=$('ci-body');
    const labelParts=[selRole.name];
    if(selTanto)labelParts.push(selTanto);
    labelParts.push(selClass);
    const label=labelParts.map(s=>`<span class="selected-badge">${s}</span>`).join('<span style="margin:0 2px;color:var(--muted)">›</span>');
    body.innerHTML=stepBar(stepNum)+
      `<button class="back-btn" id="backBtn">← クラス選択に戻る</button>`+
      `<div style="text-align:center;margin-bottom:14px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px">${label}</div>`+
      `<div class="ci-lbl">お名前を入力してください</div>`+
      `<input class="ci-inp" id="nameInp" placeholder="例：山田 花子" autocomplete="off"/>`+
      `<button class="ci-btn" id="submitBtn" disabled>出席を記録する</button>`;
    $('backBtn').onclick=showStepClass;
    const inp=$('nameInp');
    const btn=$('submitBtn');
    inp.oninput=()=>{btn.disabled=!inp.value.trim();};
    inp.onkeydown=e=>{if(e.key==='Enter'&&inp.value.trim())doCI(inp.value);};
    btn.onclick=()=>doCI(inp.value);
    setTimeout(()=>inp.focus(),100);
  }

  async function doCI(name){
    const t=name.trim();if(!t||!meeting)return;
    const roleLabel=selTanto?selRole.name+' / '+selTanto:selRole.name;
    meeting.attendees=meeting.attendees||{};
    meeting.records=meeting.records||[];
    meeting.records.push({cls:selClass,name:t,role:roleLabel,time:nowt()});
    meeting.attendees[selClass]=(meeting.attendees[selClass]||0)+1;
    try{
      await api.put('/meetings/'+MID,{attendees:meeting.attendees,records:meeting.records});
      upCount();
      showOK(t,roleLabel,selClass);
      setTimeout(()=>showStepRole(),2100);
    }catch(e){showErr('エラーが発生しました');}
  }

  function showOK(name,role,cls){
    const s=el('div','splash');
    s.innerHTML=`<div class="splash-icon">✅</div><div class="splash-name">${name} さん</div><div class="splash-sub">${role} ／ ${cls}</div>`;
    document.body.appendChild(s);setTimeout(()=>s.remove(),2000);
  }
  function showErr(msg){
    const s=el('div','err-splash');
    s.innerHTML='<div style="font-size:3rem">⚠️</div><p style="color:var(--red);font-weight:700">'+msg+'</p>';
    document.body.appendChild(s);setTimeout(()=>s.remove(),2200);
  }

  init();
}

// ═══════════════════════════════
// 管理者画面
// ═══════════════════════════════
else{
  $('app').innerHTML=`
  <div class="topbar"><h1>🌿 PTA 出欠管理</h1><span class="pill">管理者</span></div>
  <div class="tabs">
    <button class="tab on" data-t="list">📋 一覧</button>
    <button class="tab" data-t="create">➕ 新規</button>
    <button class="tab" data-t="url">🔗 URL発行</button>
    <button class="tab" data-t="att">📊 集計</button>
  </div>
  <div class="page">
    <div id="t-list"></div>
    <div id="t-create" class="hidden"></div>
    <div id="t-url" class="hidden"></div>
    <div id="t-att" class="hidden"></div>
  </div>`;

  let sel=null,timer=null;

  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>goTab(t.dataset.t));
  function goTab(name){
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.t===name));
    ['list','create','url','att'].forEach(id=>$('t-'+id).classList.toggle('hidden',id!==name));
    if(timer){clearInterval(timer);timer=null;}
    if(name==='list')rList();
    if(name==='url')rURL();
    if(name==='att'){rAtt();timer=setInterval(rAttSilent,5000);}
  }

  // ── 一覧 ──────────────────────────
  async function rList(){
    const box=$('t-list');
    box.innerHTML='<div class="loading">読み込み中...</div>';
    const data=await api.get('/meetings');
    box.innerHTML='';
    const card=el('div','card');
    card.innerHTML='<div class="card-head">📋 登録済み会議</div>';
    const ms=Object.values(data);
    if(!ms.length){card.innerHTML+='<p style="color:var(--muted);font-size:.86rem">まだ会議がありません。「新規」から追加してください。</p>';}
    ms.forEach(m=>{
      const total=(m.records||[]).length;
      const it=el('div','m-item'+(sel===m.id?' sel':''));
      it.innerHTML=`<div><div class="m-name">${m.title}</div><div class="m-sub">${fmt(m.date)||'日時未設定'} ／ 出席${total}名</div></div>`+
        `<div style="display:flex;gap:6px;align-items:center"><span class="badge">${total}名</span>`+
        `<button class="btn btn-ghost btn-sm no-print" data-del="${m.id}">削除</button></div>`;
      it.onclick=e=>{if(e.target.dataset.del)return;sel=m.id;rList();};
      card.appendChild(it);
    });
    box.appendChild(card);
    if(sel){
      const row=el('div','no-print');row.style.cssText='display:flex;gap:8px;justify-content:flex-end;';
      row.innerHTML='<button class="btn btn-ghost" id="goURL">URL発行 →</button><button class="btn btn-green" id="goAtt">集計を見る →</button>';
      box.appendChild(row);
      $('goURL').onclick=()=>goTab('url');
      $('goAtt').onclick=()=>goTab('att');
    }
    box.querySelectorAll('[data-del]').forEach(b=>b.onclick=async e=>{
      e.stopPropagation();if(!confirm('削除しますか？'))return;
      await api.del('/meetings/'+b.dataset.del);
      if(sel===b.dataset.del)sel=null;rList();
    });
  }

  // ── 新規作成 ──────────────────────
  $('t-create').innerHTML=`
  <div class="card">
    <div class="card-head">➕ 新しい会議を作成</div>
    <div class="lbl">会議名</div>
    <input class="inp" id="ntitle" placeholder="例：6月運営委員会" style="margin-bottom:10px"/>
    <div class="lbl">日時</div>
    <input class="inp" type="datetime-local" id="ndate" style="margin-bottom:14px"/>
    <hr class="hr"/>
    <div class="lbl">連絡事項・議題（任意）</div>
    <textarea class="inp" id="nmemo" rows="4" placeholder="例）・次回は7月15日&#10;・会費の件について" style="resize:vertical;line-height:1.7;min-height:90px"></textarea>
    <button class="btn btn-green btn-full mt8" id="create">会議を作成する</button>
  </div>`;
  $('create').onclick=async()=>{
    const title=$('ntitle').value.trim();
    if(!title){alert('会議名を入力してください');return;}
    const id='m'+Date.now();
    await api.post('/meetings',{id,title,date:$('ndate').value,memo:$('nmemo').value,attendees:{},records:[]});
    $('ntitle').value='';$('ndate').value='';$('nmemo').value='';
    sel=id;goTab('url');
  };

  // ── URL発行 ──────────────────────
  function rURL(){
    const box=$('t-url');box.innerHTML='';
    if(!sel){box.innerHTML='<div class="card"><p style="color:var(--muted)">一覧から会議を選択してください。</p></div>';return;}
    const url=location.origin+location.pathname+'?meeting='+sel;
    const card=el('div','card');
    card.innerHTML=`
      <div class="card-head">🔗 チェックインURL</div>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px">このURLをQRコードにして会場に掲示してください。</p>
      <div class="url-label">チェックインURL</div>
      <div class="url-box">${url}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px" class="no-print">
        <button class="btn btn-green btn-sm" id="ucopy">📋 URLをコピー</button>
        <button class="btn btn-ghost btn-sm" id="uqr">🔗 QR作成サービスを開く</button>
      </div>
      <hr class="hr"/>
      <div style="background:var(--lg);border-radius:10px;padding:12px;font-size:.8rem;line-height:1.7">
        <b>QRコードの作り方</b><br>
        ① 「URLをコピー」を押す<br>
        ② 「QR作成サービスを開く」を押す<br>
        ③ URLを貼り付けてQRを作成・印刷
      </div>`;
    box.appendChild(card);
    $('ucopy').onclick=()=>navigator.clipboard.writeText(url).then(()=>alert('コピーしました！'));
    $('uqr').onclick=()=>window.open('https://qr.quel.jp/?text='+encodeURIComponent(url),'_blank');
  }

  // ── 集計 ──────────────────────────
  async function rAtt(){
    const box=$('t-att');box.innerHTML='';
    if(!sel){box.innerHTML='<div class="card"><p style="color:var(--muted)">一覧から会議を選択してください。</p></div>';return;}
    const m=await api.get('/meetings/'+sel);
    if(m.error){box.innerHTML='<div class="card"><p style="color:var(--muted)">会議が見つかりません。</p></div>';return;}
    const records=m.records||[];
    const total=records.length;

    const stats=el('div','stats');
    stats.innerHTML=`<div class="stat"><div class="stat-n" id="total-n">${total}</div><div class="stat-l">合計出席者数</div></div>`;
    box.appendChild(stats);

    // クラス別サマリ
    const byClass={};
    records.forEach(r=>{if(!byClass[r.cls])byClass[r.cls]=[];byClass[r.cls].push(r);});
    const sumCard=el('div','card');
    sumCard.innerHTML='<div class="card-head">📊 クラス別集計</div><div id="cls-sum"></div>';
    box.appendChild(sumCard);
    const clsSum=$('cls-sum');
    const allCls=CLASSES.flatMap(g=>g.list);
    allCls.forEach(cls=>{
      const recs=byClass[cls]||[];
      const row=el('div','att-row '+(recs.length?'att-p':'att-a'));
      row.innerHTML=`<span style="font-weight:700">${cls}</span>`+
        `<span style="font-weight:700;color:${recs.length?'var(--forest)':'var(--muted)'}">${recs.length?recs.length+'名':'⬜ 未記録'}</span>`;
      clsSum.appendChild(row);
    });

    // 個人記録一覧（役職・担当表示）
    const detCard=el('div','card');
    detCard.innerHTML=`<div class="card-head">📋 出席者一覧</div>
      <div style="display:flex;gap:8px;margin-bottom:14px" class="no-print">
        <button class="btn btn-ghost btn-sm" id="aref">🔄 更新</button>
        <button class="btn btn-amber btn-sm" id="acsv">📥 Excelで開く（CSV）</button>
      </div>
      <div id="alist"></div>`;
    box.appendChild(detCard);
    $('aref').onclick=rAtt;
    $('acsv').onclick=()=>exportCSV(m);
    const list=$('alist');
    if(!total){list.innerHTML='<p style="color:var(--muted);font-size:.86rem">まだ誰も出席登録していません。</p>';return;}
    records.forEach(r=>{
      const row=el('div','att-row att-p');
      row.innerHTML=`<div>`+
        `<span style="font-weight:700">${r.name}</span>`+
        `${r.role?`<span style="font-size:.72rem;color:var(--muted);margin-left:6px">${r.role}</span>`:''}`+
        `<span style="font-size:.72rem;color:var(--muted);margin-left:6px">${r.cls}</span>`+
        `</div>`+
        `<span class="att-time">${r.time||''}</span>`;
      list.appendChild(row);
    });
  }

  async function rAttSilent(){
    if(!sel)return;
    const m=await api.get('/meetings/'+sel);
    if(m.error)return;
    const records=m.records||[];
    const tn=document.getElementById('total-n');
    if(tn)tn.textContent=records.length;
    const byClass={};
    records.forEach(r=>{if(!byClass[r.cls])byClass[r.cls]=[];byClass[r.cls].push(r);});
    const allCls=CLASSES.flatMap(g=>g.list);
    const clsRows=document.querySelectorAll('#cls-sum .att-row');
    clsRows.forEach((row,i)=>{
      const cls=allCls[i];if(!cls)return;
      const recs=byClass[cls]||[];
      row.className='att-row '+(recs.length?'att-p':'att-a');
      const span=row.querySelector('span:last-child');
      if(span){span.textContent=recs.length?recs.length+'名':'⬜ 未記録';span.style.color=recs.length?'var(--forest)':'var(--muted)';}
    });
    const list=$('alist');
    if(list){
      const existing=list.children.length;
      if(records.length>existing){
        for(let i=existing;i<records.length;i++){
          const r=records[i];
          const row=el('div','att-row att-p');
          row.innerHTML=`<div><span style="font-weight:700">${r.name}</span>${r.role?`<span style="font-size:.72rem;color:var(--muted);margin-left:6px">${r.role}</span>`:''}<span style="font-size:.72rem;color:var(--muted);margin-left:6px">${r.cls}</span></div><span class="att-time">${r.time||''}</span>`;
          list.appendChild(row);
        }
      }
    }
  }

  function exportCSV(m){
    // PDF順：役職の順序
    const ROLE_ORDER=['校長','教頭','教務主任','会長','副会長','監事','会計幹事','幹事','地区委員','学年委員','市子連','まついちまつり'];
    // 幹事の担当順序
    const TANTO_ORDER=['110番','人権','広報','サポート','その他'];
    // クラス順序
    const CLS_ORDER=['1-1','1-2','2-1','2-2','3-1','3-2','4-1','4-2','5-1','5-2','6-1','6-2','6-3','なかよし'];

    function roleKey(r){
      // r.role は「幹事 / 広報」または「校長」などの形式
      const parts=(r.role||'').split(' / ');
      const roleName=parts[0].trim();
      const tantoName=parts[1]?parts[1].trim():'';
      const ri=ROLE_ORDER.indexOf(roleName);
      const ti=tantoName?TANTO_ORDER.indexOf(tantoName):-1;
      const ci=CLS_ORDER.indexOf(r.cls);
      return [ri<0?99:ri, ti<0?99:ti, ci<0?99:ci];
    }

    const sorted=[...(m.records||[])].sort((a,b)=>{
      const ak=roleKey(a),bk=roleKey(b);
      for(let i=0;i<ak.length;i++){if(ak[i]!==bk[i])return ak[i]-bk[i];}
      return 0;
    });

    const rows=[['役職・担当','クラス','保護者名','チェックイン時刻']];
    sorted.forEach(r=>rows.push([r.role||'',r.cls,r.name,r.time||'']));
    // クラス列（index=1）はExcelの日付自動変換を防ぐため ="X-Y" 形式で出力
    const csv='\uFEFF'+rows.map((r,ri)=>r.map((c,ci)=>{
      const v=(c||'').toString().replace(/"/g,'""');
      if(ri>0&&ci===1)return `="${v}"`;
      return `"${v}"`;
    }).join(',')).join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=m.title+'_出欠.csv';a.click();
  }

  rList();
}
</script>
