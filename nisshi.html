<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PTA 業務日誌</title>
<style>
:root{
  --green:#2d6a4f;--forest:#1b4332;--lime:#d8f3dc;
  --amber:#f4a261;--amber-light:#fff3e0;
  --ink:#1a1a1a;--muted:#6b7280;--bg:#f9fafb;--card:#fff;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.topbar{background:var(--forest);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:1.05rem;font-weight:700;letter-spacing:.03em;}
.pill{background:rgba(255,255,255,.18);border-radius:20px;padding:3px 10px;font-size:.72rem;}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid var(--lime);position:sticky;top:0;z-index:10;}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:.8rem;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;transition:all .2s;}
.tab.active{color:var(--forest);border-bottom:3px solid var(--forest);}
.pane{display:none;padding:16px;max-width:540px;margin:0 auto;}
.pane.active{display:block;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:14px;}
.card-head{font-weight:700;font-size:.92rem;margin-bottom:14px;color:var(--forest);}
.step-label{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.inp,.sel,.textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:11px 14px;font-size:.92rem;font-family:inherit;background:#fff;color:var(--ink);outline:none;transition:border .2s;}
.inp:focus,.sel:focus,.textarea:focus{border-color:var(--green);}
.textarea{resize:vertical;min-height:80px;}
.btn{border:none;border-radius:10px;padding:12px 20px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:var(--forest);}
.btn-ghost{background:#f3f4f6;color:var(--ink);}
.btn-ghost:hover{background:#e5e7eb;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-sm{padding:6px 12px;font-size:.78rem;}
.w100{width:100%;}
.mb10{margin-bottom:10px;}
.mb14{margin-bottom:14px;}
.mb16{margin-bottom:16px;}
.steps{display:flex;justify-content:center;gap:6px;margin-bottom:20px;}
.step{width:28px;height:6px;border-radius:3px;background:#e5e7eb;transition:background .3s;}
.step.done{background:var(--green);}
.step.active{background:var(--amber);}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.role-btn{border:2px solid #e5e7eb;border-radius:10px;padding:10px 8px;font-size:.82rem;font-weight:600;background:#fff;color:var(--ink);cursor:pointer;text-align:center;transition:all .15s;}
.role-btn:hover{border-color:var(--green);background:var(--lime);}
.role-btn.selected{border-color:var(--green);background:var(--lime);color:var(--forest);}
.sub-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.sub-btn{border:1.5px solid #e5e7eb;border-radius:8px;padding:9px 12px;font-size:.82rem;background:#fff;cursor:pointer;text-align:left;transition:all .15s;}
.sub-btn:hover{border-color:var(--green);background:var(--lime);}
.sub-btn.selected{border-color:var(--green);background:var(--lime);color:var(--forest);font-weight:600;}
.cls-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.cls-btn{border:1.5px solid #e5e7eb;border-radius:8px;padding:8px 4px;font-size:.8rem;background:#fff;cursor:pointer;text-align:center;transition:all .15s;}
.cls-btn:hover,.cls-btn.selected{border-color:var(--green);background:var(--lime);color:var(--forest);font-weight:600;}
.confirm-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:.86rem;}
.confirm-label{color:var(--muted);font-size:.78rem;}
.confirm-val{font-weight:600;}
.rec-card{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:14px;margin-bottom:10px;}
.rec-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.rec-name{font-weight:700;font-size:.92rem;}
.rec-role{font-size:.72rem;color:var(--muted);margin-top:2px;}
.rec-date{font-size:.72rem;color:var(--muted);text-align:right;}
.rec-body{font-size:.84rem;color:var(--ink);margin-bottom:6px;line-height:1.6;white-space:pre-wrap;}
.rec-note{font-size:.78rem;color:var(--amber);background:var(--amber-light);border-radius:6px;padding:6px 10px;margin-top:6px;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.filter-btn{border:1.5px solid #e5e7eb;border-radius:20px;padding:5px 12px;font-size:.76rem;background:#fff;cursor:pointer;}
.filter-btn.active{border-color:var(--green);background:var(--lime);color:var(--forest);font-weight:600;}
.empty{text-align:center;color:var(--muted);font-size:.86rem;padding:32px 0;}
.stats{display:flex;gap:10px;margin-bottom:14px;}
.stat{flex:1;background:#fff;border-radius:10px;box-shadow:var(--shadow);padding:12px;text-align:center;}
.stat-n{font-size:1.6rem;font-weight:700;color:var(--green);}
.stat-l{font-size:.72rem;color:var(--muted);}
</style>
</head>
<body>

<div class="topbar">
  <h1>📝 PTA 業務日誌</h1>
  <span class="pill" id="modePill">記録する</span>
</div>

<div class="tab-bar">
  <button class="tab active" data-tab="t-input" onclick="switchTab('t-input',this)">✍️ 記録する</button>
  <button class="tab" data-tab="t-list" onclick="switchTab('t-list',this)">📋 一覧</button>
</div>

<!-- ========== 入力タブ ========== -->
<div class="pane active" id="t-input">
  <div id="step-area"></div>
</div>

<!-- ========== 一覧タブ ========== -->
<div class="pane" id="t-list">
  <div class="card">
    <div class="card-head">📊 集計</div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">件</div></div>
      <div class="stat"><div class="stat-n" id="s-note">0</div><div class="stat-l">気づきあり</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-head" style="display:flex;justify-content:space-between;align-items:center">
      <span>📋 記録一覧</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="loadList()">🔄</button>
        <button class="btn btn-amber btn-sm" onclick="exportCSV()">📥 CSV</button>
      </div>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div id="rec-list"></div>
  </div>
</div>

<script>
const API='/api/nisshi';

const api={
  async get(path){const r=await fetch(API+path);return r.json();},
  async post(path,body){const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();},
  async del(path){const r=await fetch(API+path,{method:'DELETE'});return r.json();},
  async put(path,body){const r=await fetch(API+path,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
};

// ── 役職データ ──
const ROLES=[
  {name:'会長',sub:[]},
  {name:'副会長',sub:[]},
  {name:'監事',sub:[]},
  {name:'会計幹事',sub:[]},
  {name:'幹事',sub:['110番','人権','人権・給食','広報','サポート']},
  {name:'地区委員',sub:['箭弓町','松山A','松山B','松葉1','松葉2','松葉3','日吉','材木A','材木B','本町1','本町2']},
];

const CLASSES=['1-1','1-2','2-1','2-2','3-1','3-2','4-1','4-2','5-1','5-2','6-1','6-2','6-3','なかよし'];

// ── ステップ管理 ──
let state={role:'',sub:'',childName:'',cls:'',parentName:'',date:'',time:'',work:'',note:''};
let step=0;
const STEPS=['role','child','parent','datetime','work','note'];

function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function $(id){return document.getElementById(id);}

function switchTab(id,btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  $(id).classList.add('active');
  btn.classList.add('active');
  $('modePill').textContent=id==='t-list'?'一覧':'記録する';
  if(id==='t-list')loadList();
}

function renderStepBar(){
  const dots=STEPS.map((_,i)=>`<div class="step ${i<step?'done':i===step?'active':''}"></div>`).join('');
  return `<div class="steps">${dots}</div>`;
}

function renderStep(){
  const area=$('step-area');
  if(step===0) area.innerHTML=renderStepBar()+renderRole();
  else if(step===1) area.innerHTML=renderStepBar()+renderChild();
  else if(step===2) area.innerHTML=renderStepBar()+renderParent();
  else if(step===3) area.innerHTML=renderStepBar()+renderDatetime();
  else if(step===4) area.innerHTML=renderStepBar()+renderWork();
  else if(step===5) area.innerHTML=renderStepBar()+renderNote();
  else area.innerHTML=renderConfirm();
}

// Step0: 役職
function renderRole(){
  const btns=ROLES.map(r=>`<button class="role-btn${state.role===r.name&&!r.sub.length?' selected':''}" onclick="selectRole('${r.name}',${r.sub.length})">${r.name}</button>`).join('');
  const selectedRole=ROLES.find(r=>r.name===state.role);
  const subs=selectedRole?.sub.length?`<div class="sub-list">${selectedRole.sub.map(s=>`<button class="sub-btn${state.sub===s?' selected':''}" onclick="selectSub('${s}')">${s}</button>`).join('')}</div>`:'';
  return `<div class="card">
    <div class="card-head">👤 役職を選んでください</div>
    <div class="role-grid mb14">${btns}</div>
    ${subs}
    <button class="btn btn-green w100" id="nextRole" onclick="goNext()" ${state.role&&(!ROLES.find(r=>r.name===state.role)?.sub.length||state.sub)?'':'disabled'}>次へ →</button>
  </div>`;
}
function selectRole(name,hasSub){
  state.role=name;state.sub=hasSub?'':'';renderStep();
}
function selectSub(s){state.sub=s;renderStep();}

// Step1: 子の名前・クラス
function renderChild(){
  const clsBtns=CLASSES.map(c=>`<button class="cls-btn${state.cls===c?' selected':''}" onclick="selectCls('${c}')">${c}</button>`).join('');
  return `<div class="card">
    <div class="card-head">👦 お子さんの情報</div>
    <div class="step-label mb10">お子さんの名前</div>
    <input class="inp mb14" id="childInp" placeholder="例：山田 太郎" value="${state.childName}" oninput="state.childName=this.value;checkChildNext()"/>
    <div class="step-label mb10">クラス</div>
    <div class="cls-grid mb16">${clsBtns}</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="step--;renderStep()">← 戻る</button>
      <button class="btn btn-green w100" id="nextChild" onclick="goNext()" ${state.childName&&state.cls?'':'disabled'}>次へ →</button>
    </div>
  </div>`;
}
function selectCls(c){state.cls=c;renderStep();}
function checkChildNext(){$('nextChild')&&($('nextChild').disabled=!(state.childName.trim()&&state.cls));}

// Step2: 親の名前
function renderParent(){
  return `<div class="card">
    <div class="card-head">🙋 保護者のお名前</div>
    <input class="inp mb16" id="parentInp" placeholder="例：山田 花子" value="${state.parentName}" oninput="state.parentName=this.value;checkParentNext()"/>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="step--;renderStep()">← 戻る</button>
      <button class="btn btn-green w100" id="nextParent" onclick="goNext()" ${state.parentName?'':'disabled'}>次へ →</button>
    </div>
  </div>`;
}
function checkParentNext(){$('nextParent')&&($('nextParent').disabled=!state.parentName.trim());}

// Step3: 日付・時間
function renderDatetime(){
  const now=new Date();
  const defDate=state.date||(()=>{const d=now;return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`})();
  const defTime=state.time||(()=>{return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`})();
  if(!state.date)state.date=defDate;
  if(!state.time)state.time=defTime;
  return `<div class="card">
    <div class="card-head">📅 日付と時間</div>
    <div class="step-label mb10">日付</div>
    <input class="inp mb14" type="date" id="dateInp" value="${state.date}" onchange="state.date=this.value"/>
    <div class="step-label mb10">時間</div>
    <input class="inp mb16" type="time" id="timeInp" value="${state.time}" onchange="state.time=this.value"/>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="step--;renderStep()">← 戻る</button>
      <button class="btn btn-green w100" onclick="goNext()">次へ →</button>
    </div>
  </div>`;
}

// Step4: やったこと
function renderWork(){
  return `<div class="card">
    <div class="card-head">📌 どんなことをしましたか？</div>
    <div class="step-label mb10">活動内容（簡潔に）</div>
    <textarea class="textarea mb16" id="workInp" placeholder="例：6月の運営委員会の資料作成、配布" oninput="state.work=this.value;checkWorkNext()">${state.work}</textarea>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="step--;renderStep()">← 戻る</button>
      <button class="btn btn-green w100" id="nextWork" onclick="goNext()" ${state.work?'':'disabled'}>次へ →</button>
    </div>
  </div>`;
}
function checkWorkNext(){$('nextWork')&&($('nextWork').disabled=!state.work.trim());}

// Step5: 気づき（任意）
function renderNote(){
  return `<div class="card">
    <div class="card-head">💡 気づき・引き継ぎメモ <span style="font-size:.75rem;color:var(--muted);font-weight:400">（任意）</span></div>
    <div class="step-label mb10">次回の協議・相談事項や引き継ぎ事項があれば</div>
    <textarea class="textarea mb16" id="noteInp" placeholder="例：配布物の数が足りなくなりそう。次回は早めに確認を。" oninput="state.note=this.value">${state.note}</textarea>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="step--;renderStep()">← 戻る</button>
      <button class="btn btn-green w100" onclick="goConfirm()">確認画面へ →</button>
    </div>
  </div>`;
}

function goNext(){step++;renderStep();}

function goConfirm(){
  step=6;renderStep();
}

function renderConfirm(){
  const roleLabel=state.sub?`${state.role} / ${state.sub}`:state.role;
  return `<div class="card">
    <div class="card-head">✅ 確認してください</div>
    <div class="confirm-row"><span class="confirm-label">役職</span><span class="confirm-val">${roleLabel}</span></div>
    <div class="confirm-row"><span class="confirm-label">お子さん</span><span class="confirm-val">${state.childName} (${state.cls})</span></div>
    <div class="confirm-row"><span class="confirm-label">保護者名</span><span class="confirm-val">${state.parentName}</span></div>
    <div class="confirm-row"><span class="confirm-label">日時</span><span class="confirm-val">${state.date} ${state.time}</span></div>
    <div class="confirm-row"><span class="confirm-label">活動内容</span><span class="confirm-val" style="max-width:200px;text-align:right;white-space:pre-wrap">${state.work}</span></div>
    ${state.note?`<div class="confirm-row"><span class="confirm-label">気づき</span><span class="confirm-val" style="max-width:200px;text-align:right;white-space:pre-wrap">${state.note}</span></div>`:''}
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-ghost" onclick="step=5;renderStep()">← 戻る</button>
      <button class="btn btn-green w100" onclick="submitRecord()">💾 送信する</button>
    </div>
  </div>`;
}

async function submitRecord(){
  const record={
    role:state.sub?`${state.role} / ${state.sub}`:state.role,
    childName:state.childName,
    cls:state.cls,
    parentName:state.parentName,
    date:state.date,
    time:state.time,
    work:state.work,
    note:state.note,
    createdAt:new Date().toISOString(),
  };
  try{
    const res=await api.post('/records',record);
    if(res.ok){
      state={role:'',sub:'',childName:'',cls:'',parentName:'',date:'',time:'',work:'',note:''};
      step=0;
      $('step-area').innerHTML=`<div class="card" style="text-align:center;padding:36px 20px">
        <div style="font-size:2.5rem;margin-bottom:12px">✅</div>
        <div style="font-size:1rem;font-weight:700;color:var(--forest);margin-bottom:8px">記録しました！</div>
        <div style="font-size:.84rem;color:var(--muted);margin-bottom:20px">ありがとうございました</div>
        <button class="btn btn-green" onclick="step=0;renderStep()">続けて記録する</button>
      </div>`;
    }else{alert('送信に失敗しました');}
  }catch(e){alert('通信エラー: '+e.message);}
}

// ── 一覧 ──
let allRecords=[];
let filterRole='';

async function loadList(){
  const data=await api.get('/records');
  const raw=Array.isArray(data)?data:[];
  allRecords=raw.map((r,i)=>({_origIdx:i,...r}));
  allRecords.sort((a,b)=>b.date.localeCompare(a.date)||(b.time||'').localeCompare(a.time||''));
  // 集計
  $('s-total').textContent=allRecords.length;
  $('s-note').textContent=allRecords.filter(r=>r.note&&r.note.trim()).length;
  // フィルター
  const roles=[...new Set(allRecords.map(r=>r.role.split(' / ')[0]))];
  const fb=$('filter-bar');
  fb.innerHTML=`<button class="filter-btn${filterRole===''?' active':''}" onclick="setFilter('')">全て</button>`+
    roles.map(r=>`<button class="filter-btn${filterRole===r?' active':''}" onclick="setFilter('${r}')">${r}</button>`).join('');
  renderList();
}

function setFilter(role){filterRole=role;loadList();}

function renderList(){
  const list=$('rec-list');
  const shown=filterRole?allRecords.filter(r=>r.role.startsWith(filterRole)):allRecords;
  if(!shown.length){list.innerHTML='<div class="empty">記録がありません</div>';return;}
  list.innerHTML=shown.map((r,i)=>{
    const recId=r._id||String(r._origIdx);
    return `<div class="rec-card">
      <div class="rec-head">
        <div>
          <div class="rec-name">${r.parentName}</div>
          <div class="rec-role">${r.role} / ${r.childName}(${r.cls})</div>
        </div>
        <div style="text-align:right">
          <div class="rec-date">${r.date}</div>
          <div class="rec-date">${r.time||''}</div>
          <button class="btn btn-ghost btn-sm" style="margin-top:4px;color:#888;font-size:.68rem;margin-right:4px" onclick="openEditModal('${recId}')">✏️</button><button class="btn btn-ghost btn-sm" style="margin-top:4px;color:#e55;font-size:.68rem" onclick="deleteRecord('${recId}')">🗑️</button>
        </div>
      </div>
      <div class="rec-body">📌 ${r.work}</div>
      ${r.note&&r.note.trim()?`<div class="rec-note">💡 ${r.note}</div>`:''}
    </div>`;
  }).join('');
}

async function deleteRecord(recId){
  if(!confirm('この記録を削除しますか？'))return;
  const res=await api.del('/records/'+encodeURIComponent(recId));
  if(res.ok)loadList();
  else alert('削除に失敗しました');
}

function openEditModal(recId){
  const r=allRecords.find(rec=>(rec._id||String(rec._origIdx))===recId);
  if(!r)return;
  const allRoleNames=ROLES.flatMap(r2=>r2.sub.length?r2.sub.map(s=>r2.name+(s?'('+s+')':'')):r2.name);
  const roleLabel=r.sub?r.role+'('+r.sub+')':r.role;
  const roleOpts=ROLES.flatMap(r2=>r2.sub.length?r2.sub.map(s=>{const v=r2.name+'__'+s;const l=r2.name+'('+s+')';return `<option value="${v}"${roleLabel===l?'selected':''}>${l}</option>`}):`<option value="${r2.name}__"${r.role===r2.name&&!r.sub?'selected':''}>${r2.name}</option>`).join('');
  const clsOpts=CLASSES.map(c=>`<option value="${c}"${r.cls===c?'selected':''}>${c}</option>`).join('');
  const modal=document.createElement('div');
  modal.id='editModal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.innerHTML=`
    <div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;">
      <div style="font-weight:700;font-size:1rem;margin-bottom:16px;">✏️ 記録を修正</div>
      <div class="step-label mb10">役職</div>
      <select class="sel mb14" id="e-role">${roleOpts}</select>
      <div class="step-label mb10">お子さんの名前</div>
      <input class="inp mb14" id="e-childName" value="${r.childName||''}"/>
      <div class="step-label mb10">クラス</div>
      <select class="sel mb14" id="e-cls">${clsOpts}</select>
      <div class="step-label mb10">保護者名</div>
      <input class="inp mb14" id="e-parentName" value="${r.parentName||''}"/>
      <div class="step-label mb10">日付</div>
      <input class="inp mb14" type="date" id="e-date" value="${r.date||''}"/>
      <div class="step-label mb10">時間</div>
      <input class="inp mb14" type="time" id="e-time" value="${r.time||''}"/>
      <div class="step-label mb10">活動内容</div>
      <textarea class="textarea mb14" id="e-work">${r.work||''}</textarea>
      <div class="step-label mb10">気づき</div>
      <textarea class="textarea mb16" id="e-note">${r.note||''}</textarea>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('editModal').remove()">キャンセル</button>
        <button class="btn" style="flex:1;background:#e55;color:#fff;border:none" onclick="deleteFromModal('${recId}')">🗑️ 削除</button>
        <button class="btn btn-green" style="flex:1" onclick="saveEdit('${recId}')">保存</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
}

async function saveEdit(recId){
  const roleVal=document.getElementById('e-role').value;
  const [roleName,sub]=roleVal.split('__');
  const updated={
    role:roleName,
    sub:sub||'',
    childName:document.getElementById('e-childName').value.trim(),
    cls:document.getElementById('e-cls').value,
    parentName:document.getElementById('e-parentName').value.trim(),
    date:document.getElementById('e-date').value,
    time:document.getElementById('e-time').value,
    work:document.getElementById('e-work').value.trim(),
    note:document.getElementById('e-note').value.trim(),
  };
  const res=await api.put('/records/'+encodeURIComponent(recId),updated);
  if(res.ok){document.getElementById('editModal').remove();loadList();}
  else alert('保存に失敗しました');
}

async function deleteFromModal(recId){
  if(!confirm('この記録を削除しますか？'))return;
  const res=await api.del('/records/'+encodeURIComponent(recId));
  if(res.ok){document.getElementById('editModal').remove();loadList();}
  else alert('削除に失敗しました');
}

function exportCSV(){
  if(!allRecords.length){alert('記録がありません');return;}
  const rows=[['日付','時間','役職','お子さん名','クラス','保護者名','活動内容','気づき']];
  allRecords.forEach(r=>rows.push([r.date,r.time||'',r.role,r.childName,r.cls,r.parentName,r.work,r.note||'']));
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='PTA業務日誌.csv';a.click();
}

// 初期表示
renderStep();
</script>
</body>
