<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>サポート活動 出欠管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{--forest:#c96a1e;--lg:#fdf0e6;--cream:#faebd7;--paper:#fffaf5;--border:#e8d5bc;--muted:#8a7560;--amber:#b83232;--red:#b83232;--ink:#2a1f14;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.topbar{background:var(--forest);color:#fff;height:52px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.topbar h1{font-size:1rem;font-weight:700;}
.pill{font-size:.7rem;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 10px;}
.tabs{display:flex;border-bottom:2px solid var(--border);background:#fff;}
.tab{flex:1;padding:12px 4px;border:none;background:none;font-family:'Noto Sans JP',sans-serif;font-size:.78rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;}
.tab.on{color:var(--forest);border-bottom-color:var(--forest);}
.page{padding:18px 16px;max-width:640px;margin:0 auto;}
.card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.04);}
.card-head{font-size:.95rem;font-weight:700;color:var(--forest);margin-bottom:14px;}
.lbl{font-size:.76rem;color:var(--muted);margin-bottom:4px;}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.92rem;font-family:'Noto Sans JP',sans-serif;background:var(--paper);outline:none;}
.inp:focus{border-color:var(--forest);}
.hr{border:none;border-top:1.5px solid var(--border);margin:14px 0;}
.mt8{margin-top:8px;}
.btn{padding:10px 18px;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:.86rem;cursor:pointer;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-green{background:var(--forest);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-ghost{background:var(--cream);color:var(--ink);}
.btn-sm{padding:6px 12px;font-size:.76rem;}
.btn-full{width:100%;}
.m-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;background:var(--cream);margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;}
.m-item:hover{background:#e3ddd2;}
.m-item.sel{background:var(--lg);border-color:var(--forest);}
.m-name{font-weight:700;font-size:.92rem;}
.m-sub{font-size:.74rem;color:var(--muted);margin-top:2px;}
.badge{display:inline-block;background:var(--forest);color:#fff;border-radius:20px;padding:2px 10px;font-size:.7rem;font-weight:700;}
.url-box{background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:.78rem;word-break:break-all;margin:10px 0;}
.url-label{font-size:.72rem;color:var(--muted);margin-bottom:4px;}
.stats{display:flex;gap:10px;margin-bottom:14px;}
.stat{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.stat-n{font-size:1.8rem;font-weight:700;color:var(--forest);}
.stat-l{font-size:.68rem;color:var(--muted);}
.att-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;margin-bottom:5px;font-size:.86rem;}
.att-p{background:var(--lg);}
.att-a{background:var(--cream);color:var(--muted);}
.att-time{font-size:.7rem;color:var(--muted);}
/* チェックインページ */
.ci-wrap{min-height:100vh;background:linear-gradient(150deg,#fde8d0,#fffaf5 60%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 18px;}
.ci-card{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:28px 22px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.08);}
.ci-title{font-size:1.3rem;font-weight:700;color:var(--forest);text-align:center;margin-bottom:4px;}
.ci-date{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:20px;}
.ci-lbl{font-size:.88rem;color:var(--muted);text-align:center;margin-bottom:14px;}
.ci-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-top:14px;}
.steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px;}
.step{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;border:2px solid var(--border);color:var(--muted);}
.step.active{background:var(--forest);border-color:var(--forest);color:#fff;}
.step.done{background:var(--lg);border-color:var(--forest);color:var(--forest);}
.step-line{flex:1;height:2px;background:var(--border);max-width:30px;}
.selected-badge{display:inline-block;background:var(--lg);border:1.5px solid var(--forest);border-radius:20px;padding:4px 14px;font-size:.84rem;font-weight:700;color:var(--forest);margin-bottom:16px;}
.class-section{margin-bottom:14px;}
.class-year{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.05em;}
.class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.class-btn{padding:14px 8px;border:2px solid var(--border);border-radius:12px;background:var(--paper);font-family:'Noto Sans JP',sans-serif;font-size:1rem;font-weight:700;color:var(--ink);cursor:pointer;text-align:center;transition:background .15s,border-color .15s,transform .1s;}
.class-btn:hover{background:var(--lg);border-color:var(--forest);}
.class-btn:active{transform:scale(.95);}
.class-btn.nakayoshi{grid-column:1/-1;}
.ci-inp{width:100%;padding:14px;border:2px solid var(--border);border-radius:12px;font-size:1.1rem;font-family:'Noto Sans JP',sans-serif;text-align:center;background:var(--paper);outline:none;margin-bottom:10px;}
.ci-inp:focus{border-color:var(--forest);}
.ci-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--forest);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}
.ci-btn:disabled{opacity:.35;cursor:not-allowed;}
.back-btn{background:none;border:none;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:.82rem;cursor:pointer;margin-bottom:12px;padding:4px 0;text-decoration:underline;}
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:14px;z-index:999;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.splash-icon{font-size:4.5rem;}
.splash-name{font-size:1.9rem;font-weight:700;}
.splash-sub{font-size:.95rem;opacity:.8;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CLASSES=[
  {year:'1年生', list:['1-1','1-2']},
  {year:'2年生', list:['2-1','2-2']},
  {year:'3年生', list:['3-1','3-2']},
  {year:'4年生', list:['4-1','4-2']},
  {year:'5年生', list:['5-1','5-2']},
  {year:'6年生', list:['6-1','6-2','6-3']},
  {year:'特別支援', list:['なかよし']},
];
const CLS_ORDER=['1-1','1-2','2-1','2-2','3-1','3-2','4-1','4-2','5-1','5-2','6-1','6-2','6-3','なかよし'];

const params=new URLSearchParams(location.search);
const MID=params.get('meeting');
const $=id=>document.getElementById(id);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h)e.innerHTML=h;return e;};
const fmt=d=>d?new Date(d).toLocaleString('ja-JP',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
const nowt=()=>new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});

// APIはPTAアプリと同じWorkerを使用、KVキーは別管理
const api={
  async get(path){const r=await fetch('/api/support'+path);return r.json();},
  async post(path,body){const r=await fetch('/api/support'+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();},
  async put(path,body){const r=await fetch('/api/support'+path,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();},
  async del(path){const r=await fetch('/api/support'+path,{method:'DELETE'});return r.json();}
};

function stepBar(active,total){
  const labels=total===2?['クラス','名前']:['クラス','名前','出欠'];
  let html='<div class="steps">';
  labels.forEach((s,i)=>{
    const n=i+1;
    let cls='step';
    if(n<active)cls+=' done';
    else if(n===active)cls+=' active';
    html+=`<div class="${cls}">${n<active?'✓':n}</div>`;
    if(i<labels.length-1)html+='<div class="step-line"></div>';
  });
  html+='</div>';
  return html;
}

  async function init(){

      sec.innerHTML='<div class="class-year">'+year+'</div>';
      const grid=el('div','class-grid');
      list.forEach(cls=>{
        const btn=el('button','class-btn'+(cls==='なかよし'?' nakayoshi':''),cls);
        btn.onclick=()=>{selClass2=cls;showStepChildName();};
        grid.appendChild(btn);
      });
      sec.appendChild(grid);
      cg.appendChild(sec);
    });
  }

  // ── ステップ2：子供の名前入力 ──
  function showStepChildName(){
    const body=$('ci-body');
    const clsLabel=selClass2
      ?`<span class="selected-badge">${selClass2}</span>`
      :`<span style="font-size:.82rem;color:var(--muted)">（クラスなし）</span>`;
    body.innerHTML=stepBar(2,3)+
      `<button class="back-btn" id="backBtn">← クラス選択に戻る</button>`+
      `<div style="text-align:center;margin-bottom:14px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px">${clsLabel}</div>`+
      `<div class="ci-lbl">② お子さんの名前を入力してください</div>`+
      `<input class="ci-inp" id="childInp" placeholder="例：山田 太郎" autocomplete="off" style="margin-bottom:10px"/>`+
      `<button class="ci-btn" id="nextBtn" disabled>次へ（保護者名）</button>`;
    $('backBtn').onclick=showStepClass;
    const inp=$('childInp');
    const next=$('nextBtn');
    inp.oninput=()=>{next.disabled=!inp.value.trim();};
    inp.onkeydown=e=>{if(e.key==='Enter'&&inp.value.trim())showStepParentName(inp.value);};
    next.onclick=()=>showStepParentName(inp.value);
    setTimeout(()=>inp.focus(),100);
  }

  // ── ステップ3：保護者名入力＋出欠 ──
  function showStepParentName(childName){
    const body=$('ci-body');
    const clsLabel=selClass2
      ?`<span class="selected-badge">${selClass}</span><span style="margin:0 4px;color:var(--muted)">＋</span><span class="selected-badge">${selClass2}</span>`
      :`<span class="selected-badge">${selClass}</span>`;
    body.innerHTML=stepBar(3,3)+
      `<button class="back-btn" id="backBtn">← 子供の名前に戻る</button>`+
      `<div style="text-align:center;margin-bottom:14px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px">${clsLabel}</div>`+
      `<div style="text-align:center;margin-bottom:14px"><span class="selected-badge">👦 ${childName.trim()}</span></div>`+
      `<div class="ci-lbl">③ 保護者名を入力してください</div>`+
      `<input class="ci-inp" id="nameInp" placeholder="例：山田 花子" autocomplete="off"/>`;
    $('backBtn').onclick=()=>showStepChildName();
    const inp=$('nameInp');
    inp.oninput=()=>{
      const hasName=inp.value.trim();
      const att=$('attBtn'),abs=$('absBtn');
      if(att){att.disabled=!hasName;abs.disabled=!hasName;}
    };
    const btnWrap=document.createElement('div');
    btnWrap.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;';
    btnWrap.innerHTML=
      `<button id="attBtn" class="ci-btn" disabled style="background:var(--forest)">✅ 出席</button>`+
      `<button id="absBtn" class="ci-btn" disabled style="background:var(--amber)">❌ 欠席</button>`;
    body.appendChild(btnWrap);
    $('attBtn').onclick=()=>doCI(childName,inp.value,'出席');
    $('absBtn').onclick=()=>{
      if(!inp.value.trim())return;
      const existing=$('absReason');
      if(existing){existing.remove();return;}
      const wrap=document.createElement('div');
      wrap.id='absReason';
      wrap.style.cssText='margin-top:10px;';
      wrap.innerHTML=
        `<div class="ci-lbl" style="text-align:left;margin-bottom:6px">欠席理由（任意）</div>`+
        `<input class="ci-inp" id="reasonInp" placeholder="例：体調不良、仕事など" autocomplete="off" style="margin-bottom:8px"/>`+
        `<button id="absSubmit" class="ci-btn" style="background:var(--amber)">❌ 欠席で記録する</button>`;
      btnWrap.insertAdjacentElement('afterend',wrap);
      $('absSubmit').onclick=()=>doCI(childName,inp.value,'欠席',$('reasonInp').value);
      setTimeout(()=>$('reasonInp').focus(),100);
    };
    inp.onkeydown=e=>{if(e.key==='Enter'&&inp.value.trim())doCI(childName,inp.value,'出席');};
    setTimeout(()=>inp.focus(),100);
  }

  async function doCI(childName,parentName,status,reason){
    const child=childName.trim();
    const parent=parentName.trim();
    if(!child||!parent||!meeting)return;
    meeting.records=meeting.records||[];
    const clsInfo=selClass2||'なし';
    const rec={cls:clsInfo,childName:child,name:parent,status:status,time:nowt()};
    if(reason&&reason.trim())rec.reason=reason.trim();
    meeting.records.push(rec);
    try{
      await api.put('/meetings/'+MID,{records:meeting.records});
      upCount();
      showOK(child,parent,clsInfo,status);
      setTimeout(()=>showStepClass(),2100);
    }catch(e){
      const s=el('div','splash');s.style.background='#b83232';
      s.innerHTML='<div class="splash-icon">⚠️</div><div class="splash-name">エラー</div>';
      document.body.appendChild(s);setTimeout(()=>s.remove(),2000);
    }
  }

  function showOK(childName,parentName,cls,status){
    const isAbs=status==='欠席';
    const s=el('div','splash');
    s.style.background=isAbs?'var(--amber)':'var(--forest)';
    s.innerHTML=`<div class="splash-icon">${isAbs?'❌':'✅'}</div><div class="splash-name">${parentName} さん</div><div class="splash-sub">${cls} ／ ${childName} ／ ${status}</div>`;
    document.body.appendChild(s);setTimeout(()=>s.remove(),2000);
  }

  init();
}

  <div class="tabs">
    <button class="tab on" data-t="list">📋 一覧</button>
    <button class="tab" data-t="create">➕ 新規</button>

  </div>`;

  let sel=null,timer=null;
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>goTab(t.dataset.t));

  function goTab(name){
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.t===name));
    ['list','create','url','att'].forEach(id=>$('t-'+id).classList.toggle('hidden',id!==name));
    if(timer){clearInterval(timer);timer=null;}
    if(name==='list')rList();
    if(name==='url')rURL();
    if(name==='att'){rAtt();timer=setInterval(rAttSilent,5000);}
  }

  async function rList(){
    const box=$('t-list');
    box.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">読み込み中...</div>';
    const data=await api.get('/meetings');
    box.innerHTML='';
    const card=el('div','card');
    card.innerHTML='<div class="card-head">📋 登録済み活動</div>';
    const ms=Object.values(data);
    if(!ms.length){card.innerHTML+='<p style="color:var(--muted);font-size:.86rem">まだ活動がありません。「新規」から追加してください。</p>';}
    ms.forEach(m=>{
      const total=(m.records||[]).length;
      const it=el('div','m-item'+(sel===m.id?' sel':''));
      it.innerHTML=`<div><div class="m-name">${m.title}</div><div class="m-sub">${fmt(m.date)||'日時未設定'} ／ ${total}名記録</div></div>`+
        `<div style="display:flex;gap:6px;align-items:center"><span class="badge">${total}名</span>`+
        `<button class="btn btn-ghost btn-sm" data-del="${m.id}">削除</button></div>`;
      it.onclick=e=>{if(e.target.dataset.del)return;sel=m.id;rList();};
      card.appendChild(it);
    });
    box.appendChild(card);
    if(sel){
      const row=el('div','');row.style.cssText='display:flex;gap:8px;justify-content:flex-end;';
      row.innerHTML='<button class="btn btn-ghost" id="goURL">URL発行 →</button><button class="btn btn-green" id="goAtt">集計を見る →</button>';
      box.appendChild(row);
      $('goURL').onclick=()=>goTab('url');
      $('goAtt').onclick=()=>goTab('att');
    }
    box.querySelectorAll('[data-del]').forEach(b=>b.onclick=async e=>{
      e.stopPropagation();if(!confirm('削除しますか？'))return;
      await api.del('/meetings/'+b.dataset.del);
      if(sel===b.dataset.del)sel=null;rList();
    });
  }

  $('t-create').innerHTML=`
  <div class="card">
    <div class="card-head">➕ 新しい活動を作成</div>
    <div class="lbl">活動名</div>
    <input class="inp" id="ntitle" placeholder="例：6月読み聞かせ" style="margin-bottom:10px"/>
    <div class="lbl">日時</div>
    <input class="inp" type="datetime-local" id="ndate" style="margin-bottom:14px"/>
    <hr class="hr"/>
    <div class="lbl">連絡事項（任意）</div>
    <textarea class="inp" id="nmemo" rows="4" placeholder="例）・集合は図書室前&#10;・エプロン着用" style="resize:vertical;line-height:1.7;min-height:90px"></textarea>
    <button class="btn btn-green btn-full mt8" id="create">活動を作成する</button>
  </div>`;
  $('create').onclick=async()=>{
    const title=$('ntitle').value.trim();
    if(!title){alert('活動名を入力してください');return;}
    const id='s'+Date.now();
    await api.post('/meetings',{id,title,date:$('ndate').value,memo:$('nmemo').value,records:[]});
    $('ntitle').value='';$('ndate').value='';$('nmemo').value='';
    sel=id;goTab('url');
  };

  function rURL(){
    const box=$('t-url');box.innerHTML='';
    if(!sel){box.innerHTML='<div class="card"><p style="color:var(--muted)">一覧から活動を選択してください。</p></div>';return;}
    const url=location.origin+'/support-checkin.html?meeting='+sel;
    const card=el('div','card');
    card.innerHTML=`
      <div class="card-head">🔗 チェックインURL</div>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px">このURLをQRコードにして掲示してください。</p>
      <div class="url-label">チェックインURL</div>
      <div class="url-box">${url}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        <button class="btn btn-green btn-sm" id="ucopy">📋 URLをコピー</button>
        <button class="btn btn-ghost btn-sm" id="uqr">📱 QRコードを表示</button>
      </div>
      <div id="qr-area" style="text-align:center;margin-bottom:14px;display:none">
        <canvas id="qr-canvas"></canvas>
        <div style="font-size:.72rem;color:var(--muted);margin-top:6px">長押しで保存できます</div>
      </div>
      <hr class="hr"/>`;
    box.appendChild(card);
    $('ucopy').onclick=()=>navigator.clipboard.writeText(url).then(()=>alert('コピーしました！'));
    $('uqr').onclick=()=>{
      const area=$('qr-area');
      if(area.style.display==='none'){
        area.style.display='block';
        drawQR(url,$('qr-canvas'));
        $('uqr').textContent='📱 QRコードを隠す';
      }else{
        area.style.display='none';
        $('uqr').textContent='📱 QRコードを表示';
      }
    };
  }

  function drawQR(text, canvas){
    if(window.QRCode){
      canvas.parentElement.innerHTML='<div id="qr-box" style="display:inline-block;padding:12px;background:#fff;border-radius:10px;border:1.5px solid var(--border)"></div><div style="font-size:.72rem;color:var(--muted);margin-top:8px">長押しで保存できます</div>';
      new QRCode($('qr-box'),{text,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});
    }else{
      const script=document.createElement('script');
      script.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
      script.onload=()=>{
        canvas.parentElement.innerHTML='<div id="qr-box" style="display:inline-block;padding:12px;background:#fff;border-radius:10px;border:1.5px solid var(--border)"></div><div style="font-size:.72rem;color:var(--muted);margin-top:8px">長押しで保存できます</div>';
        new QRCode($('qr-box'),{text,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});
      };
      document.head.appendChild(script);
    }
  }

  async function rAtt(){
    const box=$('t-att');box.innerHTML='';
    if(!sel){box.innerHTML='<div class="card"><p style="color:var(--muted)">一覧から活動を選択してください。</p></div>';return;}
    const m=await api.get('/meetings/'+sel);
    if(m.error){box.innerHTML='<div class="card"><p style="color:var(--muted)">活動が見つかりません。</p></div>';return;}
    const records=m.records||[];
    const total=records.length;
    const attCount=records.filter(r=>r.status==='出席').length;
    const absCount=records.filter(r=>r.status==='欠席').length;

    // 連絡事項表示
    if(m.memo&&m.memo.trim()){
      const memoCard=el('div','card');
      memoCard.innerHTML=`<div class="card-head">📋 連絡事項</div>`+
        `<div style="font-size:.86rem;line-height:1.8;white-space:pre-wrap;color:var(--ink)">${m.memo.trim().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
      box.appendChild(memoCard);
    }

    const stats=el('div','stats');
    stats.innerHTML=`
      <div class="stat"><div class="stat-n" id="total-n">${total}</div><div class="stat-l">合計</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--forest)">${attCount}</div><div class="stat-l">✅ 出席</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--amber)">${absCount}</div><div class="stat-l">❌ 欠席</div></div>`;
    box.appendChild(stats);

    // クラス別サマリ
    const byClass={};
    records.forEach(r=>{if(!byClass[r.cls])byClass[r.cls]=[];byClass[r.cls].push(r);});
    const sumCard=el('div','card');
    sumCard.innerHTML='<div class="card-head">📊 クラス別集計</div><div id="cls-sum"></div>';
    box.appendChild(sumCard);
    const clsSum=$('cls-sum');
    CLS_ORDER.forEach(cls=>{
      const recs=byClass[cls]||[];
      if(!recs.length)return;
      const att=recs.filter(r=>r.status==='出席').length;
      const abs=recs.filter(r=>r.status==='欠席').length;
      const row=el('div','att-row att-p');
      row.innerHTML=`<span style="font-weight:700">${cls}</span>`+
        `<span style="font-size:.82rem">✅ ${att}名 ${abs?'❌ '+abs+'名':''}</span>`;
      clsSum.appendChild(row);
    });

    // 個人記録
    const sorted=[...records].sort((a,b)=>{
      const ai=CLS_ORDER.indexOf(a.cls),bi=CLS_ORDER.indexOf(b.cls);
      return ai-bi;
    });
    const detCard=el('div','card');
    detCard.innerHTML=`<div class="card-head">📋 記録一覧</div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="btn btn-ghost btn-sm" id="aref">🔄 更新</button>
        <button class="btn btn-amber btn-sm" id="acsv">📥 Excelで開く（CSV）</button>
      </div>
      <div id="alist"></div>`;
    box.appendChild(detCard);
    $('aref').onclick=rAtt;
    $('acsv').onclick=()=>exportCSV(m);
    const list=$('alist');
    if(!total){list.innerHTML='<p style="color:var(--muted);font-size:.86rem">まだ記録がありません。</p>';return;}
    sorted.forEach(r=>{
      const isAbs=r.status==='欠席';
      const row=el('div','att-row '+(isAbs?'att-a':'att-p'));
      row.innerHTML=`<div>`+
        `<span style="font-weight:700">${r.name}</span>`+
        (r.childName?`<span style="font-size:.72rem;color:var(--muted);margin-left:6px">👦 ${r.childName}</span>`:'')+
        `<span style="font-size:.72rem;color:var(--muted);margin-left:6px">${r.cls}</span>`+
        (r.reason?`<span style="font-size:.7rem;color:var(--muted);margin-left:4px">(${r.reason})</span>`:'')+
        `</div>`+
        `<div style="display:flex;align-items:center;gap:6px">`+
        `<span style="font-size:.72rem;font-weight:700;color:${isAbs?'var(--amber)':'var(--forest)'}">${isAbs?'❌ 欠席':'✅ 出席'}</span>`+
        `<span class="att-time">${r.time||''}</span>`+
        `</div>`;
      list.appendChild(row);
    });
  }

  async function rAttSilent(){
    if(!sel)return;
    const m=await api.get('/meetings/'+sel);
    if(m.error)return;
    const records=m.records||[];
    const tn=$('total-n');if(tn)tn.textContent=records.length;
    const list=$('alist');
    if(list&&records.length>list.children.length){
      const sorted=[...records].sort((a,b)=>CLS_ORDER.indexOf(a.cls||'')-CLS_ORDER.indexOf(b.cls||''));
      list.innerHTML='';
      sorted.forEach(r=>{
        const isAbs=r.status==='欠席';
        const row=el('div','att-row '+(isAbs?'att-a':'att-p'));
        row.innerHTML=`<div><span style="font-weight:700">${r.name}</span><span style="font-size:.72rem;color:var(--muted);margin-left:6px">${r.cls}</span>${r.reason?`<span style="font-size:.7rem;color:var(--muted);margin-left:4px">(${r.reason})</span>`:''}</div>`+
          `<div style="display:flex;align-items:center;gap:6px"><span style="font-size:.72rem;font-weight:700;color:${isAbs?'var(--amber)':'var(--forest)'}">${isAbs?'❌ 欠席':'✅ 出席'}</span><span class="att-time">${r.time||''}</span></div>`;
        list.appendChild(row);
      });
    }
  }

  function exportCSV(m){
    const records=m.records||[];
    const sorted=[...records].sort((a,b)=>CLS_ORDER.indexOf(a.cls||'')-CLS_ORDER.indexOf(b.cls||''));
    const rows=[['クラス','お子さんの名前','保護者名','出欠','欠席理由','チェックイン時刻']];
    sorted.forEach(r=>rows.push([r.cls,r.childName||'',r.name,r.status||'出席',r.reason||'',r.time||'']));
    const csv='\uFEFF'+rows.map((r,ri)=>r.map((c,ci)=>{
      const v=(c||'').toString().replace(/"/g,'""');
      if(ri>0&&ci===0)return `="${v}"`;
      return `"${v}"`;
    }).join(',')).join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=m.title+'_記録.csv';a.click();
  }

  rList();
}
</script>
</body>
</html>
